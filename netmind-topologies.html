{ num:'14', title:'NAT / PAT — Network Address Translation',
  desc:'NAT translates RFC 1918 private addresses to public routable IPs. PAT (Port Address Translation / NAT overload) maps many private hosts to a single public IP using unique source port numbers to track sessions.',
  steps:[
  { label:'Step 1 — Inside/Outside/Local/Global Terminology',
    html:`<b>RFC 1918 private address space</b> (not routable on the internet):<br>
• 10.0.0.0/8 — Class A private (16.7 million addresses)<br>
• 172.16.0.0/12 — Class B private (172.16.x.x to 172.31.x.x, 1 million addresses)<br>
• 192.168.0.0/16 — Class C private (65,534 addresses)<br>
These are blocked at internet routers. Any packet with RFC1918 src/dst on the public internet is dropped.<br><br>
<b>Four NAT terms you must know:</b> <b>Inside Local</b> = private IP of internal host. <b>Inside Global</b> = public IP representing the internal host (after NAT). <b>Outside Local</b> = IP of external host as seen from inside. <b>Outside Global</b> = actual public IP of external host. For basic PAT: Inside Local → Inside Global is the only translation that changes.`,
    svg: () => D.defs()+
      `<rect x="20" y="60" width="250" height="200" rx="10" fill="#1a6fdb0d" stroke="#1a6fdb" stroke-width="1.5" stroke-dasharray="4,2"/>
       <text x="145" y="82" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#1a6fdb">INSIDE</text>`+
      D.pc('PC1',80,130,'#1a6fdb','192.168.1.10')+D.pc('PC2',80,210,'#1a6fdb','192.168.1.11')+
      D.pc('PC3',185,170,'#1a6fdb','192.168.1.12')+
      D.rt('NAT GW',330,170,'#f39c12')+
      `<rect x="415" y="60" width="200" height="200" rx="10" fill="#f39c120d" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2"/>
       <text x="515" y="82" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#f39c12">OUTSIDE</text>`+
      D.srv('Internet',515,165,'#f39c12','203.0.113.x')+
      D.ln(240,170,304,172)+D.ln(356,172,412,170,'a')+
      `<rect x="20" y="290" width="600" height="100" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
       <text x="320" y="310" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#0a0c14">NAT Terminology</text>
       <text x="40" y="328" font-family="JetBrains Mono" font-size="8" fill="#1a6fdb">Inside Local:   192.168.1.10 (private IP of PC1)</text>
       <text x="40" y="344" font-family="JetBrains Mono" font-size="8" fill="#27ae60">Inside Global:  203.0.113.5:10001 (public IP:port representing PC1)</text>
       <text x="40" y="360" font-family="JetBrains Mono" font-size="8" fill="#555">Outside Local:  8.8.8.8 (Google as seen from inside = same)</text>
       <text x="40" y="376" font-family="JetBrains Mono" font-size="8" fill="#555">Outside Global: 8.8.8.8 (Google's actual public IP)</text>`
  },
  { label:'Step 2 — PAT Translation Table in Action',
    html:`<b>PAT port number mechanics:</b> PAT uses the ephemeral port range <b>1024–65535</b> for translated source ports. When two hosts happen to use the same source port (e.g. both using :50001), PAT assigns different translated ports (:10001 and :10002) so return traffic can be demultiplexed. If the port pool is exhausted (65,535 sessions) and another public IP is available in a pool, PAT overflows to the next IP.<br><br>
<b>PAT (overload):</b> Three hosts all connecting to Google (8.8.8.8:443). Each gets a unique source port assigned. The router maintains a translation table. Return traffic is matched by public IP + destination port → demultiplexed back to the correct private host. Up to 65,535 sessions per public IP.`,
    svg: () => D.defs()+
      `<rect x="20" y="30" width="600" height="360" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
       <text x="320" y="55" text-anchor="middle" font-family="Syne" font-size="13" font-weight="800" fill="#0a0c14">PAT Translation Table</text>
       <rect x="20" y="62" width="600" height="24" fill="#0a0c1420"/>
       <text x="40" y="79" font-family="JetBrains Mono" font-size="8" fill="#fff" font-weight="700">Inside Local          Inside Global           Outside           Protocol</text>
       <line x1="20" y1="86" x2="620" y2="86" stroke="#dee2e6" stroke-width="1"/>
       <rect x="20" y="86" width="600" height="28" fill="#f8f9fa"/>
       <text x="40" y="104" font-family="JetBrains Mono" font-size="9" fill="#1a6fdb">192.168.1.10:50001  → 203.0.113.5:10001  → 8.8.8.8:443   TCP</text>
       <rect x="20" y="114" width="600" height="28" fill="#fff"/>
       <text x="40" y="132" font-family="JetBrains Mono" font-size="9" fill="#27ae60">192.168.1.11:50002  → 203.0.113.5:10002  → 8.8.8.8:443   TCP</text>
       <rect x="20" y="142" width="600" height="28" fill="#f8f9fa"/>

       <rect x="20" y="170" width="600" height="28" fill="#fff"/>
       <text x="40" y="188" font-family="JetBrains Mono" font-size="9" fill="#f39c12">192.168.1.10:50004  → 203.0.113.5:10004  → 1.1.1.1:443   TCP</text>
       <text x="320" y="240" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#555">Same public IP (203.0.113.5), different ports = unique sessions</text>
       <text x="320" y="258" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#555">Return traffic: dst port 10001 → demux to 192.168.1.10:50001</text>
       <rect x="40" y="280" width="540" height="90" rx="8" fill="#f0f6ff" stroke="#1a6fdb" stroke-width="1"/>
       <text x="320" y="300" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#1a6fdb">PAT Configuration</text>
       <text x="60" y="318" font-family="JetBrains Mono" font-size="8" fill="#333">ip access-list standard NAT-ACL</text>
       <text x="60" y="332" font-family="JetBrains Mono" font-size="8" fill="#333"> permit 192.168.1.0 0.0.0.255</text>
       <text x="60" y="346" font-family="JetBrains Mono" font-size="8" fill="#1a6fdb" font-weight="700">ip nat inside source list NAT-ACL interface Gi0/1 overload</text>
       <text x="60" y="360" font-family="JetBrains Mono" font-size="8" fill="#555">interface Gi0/0 → ip nat inside  ·  interface Gi0/1 → ip nat outside</text>`
  }],
  keys:[
    {l:'PAT Command',v:'ip nat inside source list ACL interface Gi0/1 overload',why:'ACL defines inside local addresses. "interface Gi0/1" uses that interface\'s IP as inside global. "overload" enables PAT. Without "overload" it\'s dynamic NAT (needs a pool).',cli:'ip access-list standard NAT-ACL\n permit 192.168.0.0 0.0.0.255\nip nat inside source list NAT-ACL interface G0/1 overload\ninterface G0/0\n ip nat inside\ninterface G0/1\n ip nat outside',tip:'"overload" = PAT. Without it = dynamic NAT (1:1 from pool).',tt:'bad'},
    {l:'Mark Both Interfaces',v:'ip nat inside AND ip nat outside — both required',why:'NAT must know which side is private (inside) and which is public (outside). Forgetting ip nat outside on the WAN interface = packets route out but return traffic isn\'t de-translated.',cli:'interface G0/0\n ip nat inside   ! LAN/private side\ninterface G0/1\n ip nat outside  ! WAN/public side\nshow ip nat translations',tip:'Both inside AND outside must be marked or NAT silently fails.',tt:'bad',t:'bad'},
    {l:'Verify',v:'show ip nat translations · show ip nat statistics',why:'Translations shows active mappings: inside local, inside global, outside. Statistics shows hit/miss counts and total translations.',cli:'show ip nat translations\nshow ip nat translations verbose\nshow ip nat statistics\nclear ip nat translation *  ! clear stale entries\ndebug ip nat',tip:'Empty translation table after config = check interface marking and ACL match.',tt:'warn'},
    {l:'Static NAT',v:'ip nat inside source static [private] [public] — for servers',why:'Creates permanent 1:1 mapping. Required for servers needing inbound connections. Bidirectional: server can also initiate outbound via public IP.',cli:'ip nat inside source static 192.168.1.100 203.0.113.5\n<span class="cli-comment">! Port forwarding</span>\nip nat inside source static tcp 192.168.1.100 80 203.0.113.5 80',tip:'Static NAT is bidirectional — server can also initiate outbound connections.'},
    {l:'Clear Table',v:'clear ip nat translation * — removes all active entries',why:'Clears stale entries after changing NAT config. Must clear for config changes to take effect on active flows.',cli:'clear ip nat translation *\nclear ip nat translation inside 203.0.113.1 192.168.1.10  ! specific entry',tip:'Must clear NAT table after config changes for new rules to take effect.',tt:'warn'},
    {l:'Exam Trap',v:'Omitting "overload" = dynamic NAT (pool required, not PAT)',why:'"ip nat inside source list ACL pool MYPOOL" = dynamic NAT, not PAT. If pool has 5 IPs and 6 hosts want to NAT, the 6th is dropped.',cli:'<span class="cli-comment">! Dynamic NAT (needs pool)</span>\nip nat pool MYPOOL 203.0.113.5 203.0.113.10 netmask 255.255.255.0\nip nat inside source list ACL pool MYPOOL\n<span class="cli-comment">! PAT (single IP)</span>\nip nat inside source list ACL interface G0/1 overload',tip:'"overload" makes it PAT. Without it = dynamic NAT (1:1, needs a pool).',tt:'bad',t:'bad'}
  ]
},

/* ── 10 ACL ── */
{ num:'15', title:'ACL — Access Control Lists',
  desc:'ACLs are ordered rule sets evaluated top-to-bottom. First match wins — processing stops immediately. An invisible implicit "deny any any" terminates every ACL. Applied per-interface per-direction.',
  steps:[
  { label:'Step 1 — Top-Down Processing & First Match',
    html:`<b>Wildcard mask = 255.255.255.255 − subnet mask.</b><br>
Subnet /24 = 255.255.255.0 → wildcard = 0.0.0.255 (match first 24 bits, ignore last 8)<br>
Subnet /26 = 255.255.255.192 → wildcard = 0.0.0.63<br>
Subnet /16 = 255.255.0.0 → wildcard = 0.0.255.255<br>
<b>Shortcuts:</b> <code>host 10.0.0.1</code> = 10.0.0.1 0.0.0.0 (exact match). <code>any</code> = 0.0.0.0 255.255.255.255 (match all).<br><br>
<b>Editing named ACLs by sequence number:</b><br>
<code>ip access-list extended MY-ACL</code><br>
<code>no 10</code> ← delete rule at sequence 10<br>
<code>15 permit ip host 10.0.0.5 any</code> ← insert at sequence 15 (between 10 and 20)<br>
Numbered ACLs cannot be edited — must delete entire ACL and recreate it.<br><br>
<b>ACL processing order:</b> Packets are compared against rules sequentially. The first matching rule determines the action — processing stops immediately (no further rules checked). If no rule matches, the implicit <code>deny ip any any</code> drops the packet. This is why order is critical — a permit before a deny can accidentally allow traffic.`,
    svg: () => D.defs()+
      D.pc('PC1\n10.0.0.99',80,150,'#e03e3e')+D.pc('PC2\n192.168.10.5',80,280,'#27ae60')+
      D.rt('R1',310,215,'#f39c12')+D.srv('Server\n10.1.1.100',555,215,'#1a6fdb')+
      D.ln(144,155,282,210,'r')+D.X(215,183)+
      D.ln(144,280,282,220,'b')+D.ln(338,220,519,220,'g')+
      D.pkt(144,280,282,220,'#27ae60',0)+D.pkt(338,220,519,220,'#27ae60',0.6)+
      `<rect x="50" y="345" width="520" height="52" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
       <text x="60" y="363" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">10 deny   ip host 10.0.0.99 any                ← PC1 matched here, STOP</text>
       <text x="60" y="378" font-family="JetBrains Mono" font-size="8" fill="#27ae60">20 permit tcp 192.168.10.0 0.0.0.255 any eq 443  ← PC2 matched here</text>
       <text x="60" y="393" font-family="JetBrains Mono" font-size="8" fill="#8892a4">   (implicit: deny ip any any)                ← invisible, always at end</text>`

  { label:'Step 2 — Standard vs Extended + Placement',
    html:`<b>Standard ACL (1-99):</b> Matches source IP only. No port filtering. Place CLOSE TO DESTINATION to avoid accidentally blocking traffic to other destinations. <b>Extended ACL (100-199):</b> Matches src+dst IP+protocol+port. Place CLOSE TO SOURCE — stops traffic early, saves bandwidth. Named ACLs are preferred (can edit individual rules).`,

       <text x="205" y="175" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#555">in Gi0/0 on R1</text>
       <text x="205" y="124" text-anchor="middle" font-family="DM Sans" font-size="8" fill="#27ae60">↑ near SOURCE</text>
       <text x="205" y="113" text-anchor="middle" font-family="DM Sans" font-size="8" fill="#27ae60">saves bandwidth</text>`+

    html:`<b>The #1 ACL mistake on every exam:</b> Adding a deny rule without a following permit results in ALL other traffic being blocked by the implicit deny. Always think about what happens to traffic that does NOT match your explicit rules. Also remember: only ONE ACL per interface per direction.`,

    {l:'First Match Wins',v:'Processing stops at first match — rule ORDER is critical',why:'Rules checked top-to-bottom. First match = action taken, processing stops. Put specific rules before general rules or specific rules may never be reached.',cli:'<span class="cli-comment">! Correct: specific before general</span>\n10 permit ip host 10.0.0.5 any  ! specific\n20 deny ip 10.0.0.0 0.0.0.255 any  ! general\n30 permit ip any any  ! fallback',tip:'Put the most specific rules FIRST. General rules (permit any any) go LAST.',tt:'warn',t:'warn'},

  ]

/* ── 11 TCP ── */
{ num:'18', title:'TCP 3-Way Handshake & Transport Layer',
  desc:'TCP (Transmission Control Protocol) provides connection-oriented, reliable, ordered delivery with flow control. UDP provides connectionless, fast delivery with no guarantees. Knowing which applications use which protocol is essential for ACL and firewall configuration.',
  steps:[
  { label:'Step 1 — SYN / SYN-ACK / ACK',
    html:`<b>TCP port number ranges:</b><br>
• <b>0–1023:</b> Well-known ports (assigned by IANA). HTTP=80, HTTPS=443, SSH=22, FTP=20/21, Telnet=23, SMTP=25, DNS=53, DHCP=67/68.<br>
• <b>1024–49151:</b> Registered ports (assigned applications).<br>
• <b>49152–65535:</b> Ephemeral/dynamic ports (OS assigns these as source ports for client connections).<br><br>
<b>TCP flow control — Sliding Window:</b> The receiver advertises its buffer size (window size) in every ACK. If the sender fills the receiver's buffer, it must pause. Window=0 → sender stops. Window scaling (RFC 1323) allows windows up to 1 GB for high-bandwidth long-distance links.<br><br>
<b>Retransmission:</b> Sender starts a timer when sending a segment. If ACK not received before timeout → retransmit. Duplicate ACKs (3 in a row) = fast retransmit (don't wait for timer).<br><br>
<b>Three-way handshake:</b> Establishes a TCP session and synchronises Initial Sequence Numbers (ISNs) in both directions. ISNs are random to prevent TCP hijacking. After ACK, the connection is ESTABLISHED and data transfer begins. Sequence numbers track every byte — retransmission happens if ACK not received within timeout.`,
    svg: () => D.defs()+
      D.pc('CLIENT\n192.168.1.10',105,200)+D.srv('SERVER\n10.1.1.100',515,200,'#1a6fdb')+
      D.ln(169,192,479,192,'b')+`<text x="324" y="184" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#8e44ad">① SYN  SEQ=100  ACK=0  SYN=1</text>`+
      D.ln(479,206,169,206,'g')+`<text x="324" y="220" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60">② SYN-ACK  SEQ=300  ACK=101  SYN=1 ACK=1</text>`+
      D.ln(169,218,479,218,'b')+`<text x="324" y="232" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#1a6fdb">③ ACK  SEQ=101  ACK=301  ACK=1</text>`+
      D.pkt(169,192,479,192,'#8e44ad',0)+
      D.pkt(479,206,169,206,'#27ae60',0.8)+
      D.pkt(169,218,479,218,'#1a6fdb',1.6)+
      `<rect x="30" y="275" width="270" height="120" rx="8" fill="#8e44ad0e" stroke="#8e44ad" stroke-width="1"/>
       <text x="165" y="295" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#8e44ad">TCP Header Flags</text>
       <text x="46" y="313" font-family="JetBrains Mono" font-size="8" fill="#555">SYN  = synchronise seq numbers</text>
       <text x="46" y="328" font-family="JetBrains Mono" font-size="8" fill="#555">ACK  = acknowledgement field valid</text>
       <text x="46" y="343" font-family="JetBrains Mono" font-size="8" fill="#555">FIN  = no more data from sender</text>
       <text x="46" y="358" font-family="JetBrains Mono" font-size="8" fill="#555">RST  = reset connection immediately</text>
       <text x="46" y="373" font-family="JetBrains Mono" font-size="8" fill="#555">PSH  = push data to application now</text>
       <text x="46" y="388" font-family="JetBrains Mono" font-size="8" fill="#555">URG  = urgent data present</text>`+
      `<rect x="330" y="275" width="270" height="120" rx="8" fill="#1a6fdb0e" stroke="#1a6fdb" stroke-width="1"/>
       <text x="465" y="295" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#1a6fdb">TCP vs UDP</text>
       <text x="346" y="313" font-family="DM Sans" font-size="9" fill="#333">TCP: connection-oriented, reliable</text>
       <text x="346" y="328" font-family="DM Sans" font-size="9" fill="#555">HTTP HTTPS SSH FTP Telnet SMTP</text>
       <text x="346" y="350" font-family="DM Sans" font-size="9" fill="#333">UDP: fast, connectionless</text>
       <text x="346" y="365" font-family="DM Sans" font-size="9" fill="#555">DNS DHCP TFTP SNMP NTP VoIP</text>
       <text x="346" y="385" font-family="JetBrains Mono" font-size="8" fill="#f39c12">⚠ DNS uses UDP 53 (no handshake)</text>`
  }],
  keys:[
    {l:'SYN',v:'Client→Server. ISN in SEQ field. SYN flag=1.',t:''},
    {l:'SYN-ACK',v:'Server→Client. Server ISN + ACK(clientISN+1)',t:''},
    {l:'ACK',v:'Client→Server. ACK=serverISN+1. Session open.',t:'good'},
    {l:'4-way teardown',v:'FIN → ACK → FIN → ACK — each direction closes independently',t:'',why:'TCP connection teardown is a 4-step process because each direction is closed independently. Either side can initiate. The FIN from one side says "I have no more data to send" but the other side can still send data (half-close) before sending its own FIN.',cli:'<span class="cli-comment">! TCP connection states visible with netstat:</span>\n<span class="cli-comment">! ESTABLISHED = connection active</span>\n<span class="cli-comment">! TIME_WAIT = connection closed, wait 2×MSL</span>\n<span class="cli-comment">! FIN_WAIT_1 = sent FIN, waiting for ACK</span>\n<span class="cli-comment">! CLOSE_WAIT = received FIN, waiting to close</span>\n<span class="cli-comment">! For CCNA: know the 3-way open (SYN/SYN-ACK/ACK)</span>\n<span class="cli-comment">! and 4-way close (FIN/ACK/FIN/ACK)</span>',tip:'TIME_WAIT lasts 2×MSL (Maximum Segment Lifetime = 60-120s). Prevents stale packets from old connections being confused with new ones.',tt:'info'},

    {l:'Exam trap',v:'DNS uses UDP 53 for queries — no 3-way handshake',t:'bad'},
  ]
},

{ num:'19', title:'SSH vs Telnet — Secure Remote Access',
  desc:'Telnet sends everything — including passwords — as plaintext on TCP 23. SSH encrypts the entire session using asymmetric (RSA) key exchange followed by symmetric (AES) encryption. Always configure SSH v2. Telnet is prohibited on any production network.',
  steps:[
  { label:'Step 1 — Telnet: Cleartext Exposed',
    html:`<b>Telnet (TCP 23) is completely transparent to any packet capture.</b> An attacker running Wireshark on any switch, router, or shared segment can see your exact keystrokes including enable password. This is not theoretical — any admin running Telnet in production is a compliance violation.`,
    svg: () => D.defs()+
      D.pc('Admin PC',80,200)+D.rt('Switch',510,200,'#f39c12')+D.pc('ATTACKER',295,80,'#e03e3e')+
      D.ln(144,204,484,204)+D.ln(295,200,295,116,'a')+
      `<rect x="148" y="118" width="294" height="60" rx="8" fill="#fef2f2" stroke="#e03e3e" stroke-width="2"/>
       <text x="295" y="140" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#e03e3e">CAPTURED BY WIRESHARK</text>
       <text x="295" y="160" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#333">enable · cisco · conf t · username admin secret P@ssw0rd</text>`+
      `<text x="295" y="292" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#555">TCP 23 · Raw text on wire · No encryption · Every character visible</text>`+
      D.cb(100,320,390,40,'Anyone on the path — switches, routers, WiFi APs — can see this\nTelnet = instant full compromise if traffic intercepted')
  },
  { label:'Step 2 — SSH v2: Encrypted Session + 6 Steps',
    html:`<b>Why hostname + domain name are required BEFORE generating RSA keys:</b><br>
The RSA key is stored with a label = <b>hostname.domainname</b>. Without both configured, the key has no valid label and IOS refuses to generate it. Example: hostname=SW1, domain=netmind.lab → key label = "SW1.netmind.lab".<br><br>
<b>VTY lines:</b> Virtual Terminal lines are the logical SSH/Telnet sessions. IOS has VTY 0-4 by default (5 simultaneous sessions). Use <code>line vty 0 15</code> to configure all 16 possible sessions. If you only configure <code>line vty 0 4</code>, the 6th SSH connection will fail with "connection refused".<br><br>
<b>transport input options:</b><br>
<code>transport input ssh</code> — SSH only (correct)<br>
<code>transport input telnet</code> — Telnet only (never use)<br>
<code>transport input all</code> — Both SSH and Telnet (avoid)<br>
<code>transport input none</code> — Block ALL remote access<br><br>
<b>SSH v2 (TCP 22):</b> RSA keypair authenticates the server. AES-256 encrypts all session data. Even a perfect packet capture shows only ciphertext. <b>Critical: the 6 config steps must be done in order</b> — hostname and domain-name must exist before you can generate the RSA key. SSH enables automatically once the RSA key exists.`,
    svg: () => D.defs()+
      D.pc('Admin PC',80,190)+D.rt('Switch',510,190,'#27ae60')+D.pc('ATTACKER',295,75,'#8892a4')+
      D.ln(144,194,484,194,'g')+D.ln(295,194,295,111)+
      `<rect x="148" y="108" width="294" height="55" rx="8" fill="#f0f9f4" stroke="#27ae60" stroke-width="1.5"/>
       <text x="295" y="130" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#27ae60">AES-256 CIPHERTEXT</text>
       <text x="295" y="150" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#8892a4">d9f2a8c1e4b7... (computationally unbreakable)</text>`+
      `<text x="295" y="80" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#8892a4">Attacker sees only ciphertext</text>`+
      D.info(30,255,580,'SSH Configuration — 6 Steps (must be in this order)',['① hostname SW1                               ← required for RSA key label','② ip domain-name netmind.lab                ← required for RSA key label','③ crypto key generate rsa modulus 2048       ← generates RSA keypair','④ username admin privilege 15 secret Cisco123! ← local user account','⑤ ip ssh version 2                          ← disable SSHv1','⑥ line vty 0 15  → transport input ssh  → login local'],'#1a6fdb')
  }],
  keys:[
    {l:'SSH TCP 22',v:'Encrypted with AES-256. Use v2 only — v1 has vulnerabilities.',t:'good',
     why:'SSH v2 uses AES-256 symmetric encryption after RSA key exchange. Any packet capture shows only ciphertext — computationally infeasible to break. Telnet sends everything including enable passwords as readable ASCII.',
     cli:'<span class="cli-comment">! 6 steps in exact order</span>\nhostname SW1\nip domain-name netmind.lab\ncrypto key generate rsa modulus 2048\nusername admin privilege 15 secret Cisco123!\nip ssh version 2\nline vty 0 15\n transport input ssh\n login local',

{ num:'24', title:'SDN & Network Automation',
  desc:'SDN separates the control plane (routing decisions) from the data plane (packet forwarding). A centralised controller programs all devices via APIs, enabling intent-based networking, automated policy deployment, and single-pane-of-glass visibility.',
  steps:[
  { label:'Step 1 — Control Plane vs Data Plane',
    html:`<b>Data centre architecture evolution:</b><br>
<b>Traditional 3-tier:</b> Core → Distribution → Access. Hierarchical, predictable, but north-south (client-to-server) optimised. East-west (server-to-server) traffic must travel up to distribution then back down — inefficient for modern microservices.<br><br>
<b>Spine-Leaf (Clos fabric):</b> Every leaf switch connects to every spine switch. No leaf-to-leaf or spine-to-spine links. Result: any server to any server = exactly 2 hops. Predictable latency. Scales horizontally by adding spine or leaf nodes. Typical for modern data centres and cloud.<br><br>
<b>Underlay:</b> The physical IP network that carries traffic (routers, switches, physical links). Underlay is simple, stable, high-speed.<br>
<b>Overlay:</b> Virtual network tunnelled on top of underlay (VXLAN, GRE, IPsec). Multiple overlays can share one underlay. SDN controller manages overlay policy without touching underlay hardware.<br><br>
<b>Intent-based networking (IBN):</b> Admin declares the desired outcome ("Sales VLAN can reach Internet, not HR"). Controller translates intent into device-specific config automatically and continuously verifies compliance.<br><br>
<b>Traditional networking:</b> Every device has its own local control plane. Changes require touching every device. No global view. <b>SDN:</b> Control plane moves to a centralised controller. Devices become "dumb" fast-forwarding engines.`,
    svg: () => D.defs()+
      `<text x="155" y="40" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#555">Traditional — Distributed</text>`+

  { label:'Step 2 — Northbound & Southbound APIs',
    html:`<b>Northbound APIs</b> face upward toward applications and orchestration systems. They expose the controller's capabilities as REST/JSON endpoints. Applications call these APIs to request network behaviour. <b>Southbound APIs</b> face downward toward network devices. OpenFlow, NETCONF (uses YANG models + XML), RESTCONF (YANG + JSON via HTTP) are the main protocols.`,

  keys:[
    {l:'Northbound API',v:'Apps → Controller. REST/JSON over HTTPS. Intent-based.',t:'',
     why:'Northbound APIs let business applications and orchestration tools (Ansible, Terraform) request network behaviour without knowing device CLI syntax. The controller translates intent into device-specific configuration.',
     cli:'<span class="cli-comment">! Example REST call to DNA Center:</span>\nGET /dna/intent/api/v1/network-device\nAuthorization: Bearer {token}\nContent-Type: application/json\n<span class="cli-comment">! Returns JSON list of all devices</span>',
     tip:'Northbound = North = up toward business applications. Think: "apps talk to controller."',tt:'good'},
    {l:'Southbound API',v:'Controller → Devices. OpenFlow/NETCONF/RESTCONF.',t:'',
     why:'Southbound APIs program the actual network hardware. NETCONF uses SSH+XML+YANG. RESTCONF uses HTTPS+JSON/XML+YANG. OpenFlow directly programs forwarding tables. The controller handles all device-specific translation.',
     cli:'<span class="cli-comment">! NETCONF session (TCP 830)</span>\n<span class="cli-comment">! Runs over SSH to port 830</span>\nnetconf-yang\n<span class="cli-comment">! Enable on IOS device</span>\nshow netconf-yang sessions',
     tip:'NETCONF port = TCP 830. RESTCONF port = HTTPS 443. OpenFlow = TCP 6633 or 6653.',tt:''},
    {l:'YANG',v:'Data model language. Defines config/operational data structure.',t:'',
     why:'YANG (Yet Another Next Generation) defines WHAT can be configured — the schema. Like a class definition in programming. NETCONF/RESTCONF carry the actual data (instances). Without YANG models, you would not know what fields to send.',
     cli:'<span class="cli-comment">! YANG model structure:</span>\nmodule ietf-interfaces {\n  container interfaces {\n    list interface {\n      leaf name { type string; }\n      leaf enabled { type boolean; }\n    }\n  }\n}',
     tip:'Think of YANG as the grammar rules. NETCONF/RESTCONF are the sentences using those rules.',tt:''},
    {l:'DNA Center',v:'Cisco campus SDN controller (also called Catalyst Center)',t:'good',
     why:'Cisco DNA Center (now Catalyst Center) provides intent-based networking for campus. It automates device provisioning, policy, assurance, and analytics. Uses RESTCONF/NETCONF southbound and REST API northbound.',
     cli:'<span class="cli-comment">! DNA Center northbound API</span>\n<span class="cli-comment">! First: get auth token</span>\nPOST /api/system/v1/auth/token\n<span class="cli-comment">! Then use token in all calls</span>\nGET /dna/intent/api/v1/site',
     tip:'DNA Center = campus. APIC = data centre (ACI). Both are Cisco SDN controllers.',tt:'good'},
    {l:'Spine-Leaf',v:'Data centre fabric: every leaf connects to every spine. 2 hops max.',t:'',
     why:'Traditional 3-tier (Core-Distribution-Access) is optimised for north-south (client-to-server) traffic. Modern applications generate east-west (server-to-server) traffic. Spine-leaf provides predictable 2-hop latency for any server-to-server path.',
     cli:'<span class="cli-comment">! Spine-leaf uses ECMP</span>\n<span class="cli-comment">! All paths are equal cost</span>\n<span class="cli-comment">! Typically uses BGP or OSPF</span>\n<span class="cli-comment">! for underlay routing</span>\nrouter bgp 65000\n neighbor 10.0.0.1 remote-as 65000',
     tip:'Spine = aggregation layer. Leaf = access layer. No spine-to-spine or leaf-to-leaf links.',tt:''},
    {l:'Exam trap',v:'SDN does NOT remove the data plane — hardware still forwards at line rate',t:'bad',
     why:'SDN moves the CONTROL plane to a controller. The DATA plane (ASIC-based packet forwarding) remains on each physical device. If the controller fails, devices keep forwarding based on their last programmed state. SDN is about where decisions are made, not where packets travel.',
     cli:'<span class="cli-comment">! Verify NETCONF/RESTCONF</span>\nshow netconf-yang sessions\nshow restconf-yang\n<span class="cli-comment">! Check controller connectivity</span>\nping [controller-ip]',
     tip:'Remember: control plane = decides where. Data plane = actually moves packets. SDN centralises decisions only.',tt:'bad'},
  ]
},

{ num:'25', title:'Network Automation — Ansible & Data Formats',
  desc:'Ansible automates network configuration using YAML playbooks. It is agentless (connects via SSH/NETCONF), idempotent (safe to run repeatedly), and can configure hundreds of devices simultaneously with a single command.',
  steps:[
  { label:'Step 1 — Ansible Architecture',
    html:`<b>Push vs Pull model:</b> Ansible=push (control node pushes via SSH, no agent). Puppet/Chef=pull (agent on device checks in). Agentless = works on network gear that can't run agents.<br><br><b>Inventory formats:</b> INI: <code>[routers]</code> then hostnames/IPs. YAML: nested groups and variables. Groups can be hierarchical: [core] + [branch] = [routers:children].<br><br><b>Module selection:</b> <code>ios_command</code>=run show commands (read-only) · <code>ios_config</code>=push config lines · <code>ios_facts</code>=gather device variables · <code>ios_vlans</code>=manage VLANs declaratively · <code>ios_interfaces</code>=manage interface config.<br><br><b>Ansible components:</b> <b>Inventory</b> = list of managed devices (IP/hostname). <b>Playbook</b> = YAML file defining what to do and on which hosts. <b>Module</b> = pre-built function (ios_config, ios_vlans, ios_command). <b>Task</b> = one module call. <b>Play</b> = set of tasks for a group of hosts. Ansible connects via SSH — no agent needed on network devices.`,
    svg: () => D.defs()+
      `<rect x="20" y="40" width="180" height="340" rx="10" fill="#27ae600e" stroke="#27ae60" stroke-width="1.5"/>
       <text x="110" y="62" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#27ae60">playbook.yml</text>

    html:`<b>Three data formats for CCNA:</b> <b>YAML</b> = Ansible playbooks, human-readable, indentation-based structure (no tabs!). <b>JSON</b> = REST API responses, key-value pairs, {} objects, [] arrays. <b>XML</b> = NETCONF/RESTCONF, verbose, tag-based, hierarchical. Know how to read all three — exam may show you a snippet and ask what format it is.`,

{ num:'26', title:'IPv6 — NDP & SLAAC',
  desc:'IPv6 Neighbour Discovery Protocol (NDP) replaces both ARP and ICMP Router Discovery. It uses ICMPv6 multicast messages — no broadcasts exist in IPv6. SLAAC lets hosts auto-generate their own /128 address without DHCP.',
  steps:[
  { label:'Step 1 — NDP: Neighbour Solicitation & Advertisement',
    html:`<b>NS (type 135):</b> "Who has this IPv6 address?" — sent to the <b>solicited-node multicast address</b> FF02::1:FFxx:xxxx (only the target device joins this group). Far more efficient than IPv4 broadcast ARP. <b>NA (type 136):</b> Target replies unicast with its MAC. PC1 stores in Neighbour Cache (<code>show ipv6 neighbors</code>).`,
    svg: () => D.defs()+
      D.pc('PC1',80,250,'#27ae60','fe80::1')+
      D.pc('PC2',540,200,'#1a6fdb','2001:db8::2')+D.pc('PC3',540,300,'#8892a4')+D.pc('PC4',540,380,'#8892a4')+
      D.ln(144,248,508,208,'p')+
      D.pkt(144,248,508,208,'#8e44ad',0)+
      `<rect x="100" y="130" width="380" height="55" rx="8" fill="#8e44ad0e" stroke="#8e44ad" stroke-width="1.5"/>
       <text x="290" y="152" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#8e44ad">Neighbour Solicitation (ICMPv6 type 135)</text>
       <text x="290" y="170" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#333">Dst: FF02::1:FF00:0002 (solicited-node multicast)</text>
       <text x="290" y="182" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#8892a4">Src: PC1 link-local  ·  "Who has 2001:db8::2?"</text>`+
      D.ln(508,212,144,254,'g')+D.pkt(508,212,144,254,'#27ae60',1.5)+
      `<text x="560" y="220" font-family="DM Sans" font-size="8" fill="#1a6fdb">PC2: listens on</text>
       <text x="560" y="232" font-family="DM Sans" font-size="8" fill="#1a6fdb">this multicast</text>
       <text x="560" y="318" font-family="DM Sans" font-size="8" fill="#8892a4">PC3: NOT in</text>
       <text x="560" y="330" font-family="DM Sans" font-size="8" fill="#8892a4">this group</text>`+
      `<rect x="30" y="350" width="560" height="50" rx="8" fill="#f0f9f4" stroke="#27ae60" stroke-width="1"/>
       <text x="320" y="370" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60" font-weight="700">Neighbour Advertisement (type 136): PC2 → PC1 unicast</text>
       <text x="320" y="386" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#555">Contains PC2 MAC: aa:bb:cc:dd:ee:ff  ·  PC1 stores in neighbour cache</text>`
  },
  { label:'Step 2 — SLAAC: Stateless Address Autoconfiguration',
    html:`<b>EUI-64 address generation from MAC:</b><br>
MAC: <b>aa:bb:cc:dd:ee:ff</b><br>
Step 1: Split in half — aa:bb:cc | dd:ee:ff<br>
Step 2: Insert <b>ff:fe</b> in the middle → aa:bb:cc:<b>ff:fe</b>:dd:ee:ff<br>
Step 3: Flip bit 7 of first byte: aa = 10101010 → flip bit 7 (universal/local bit) → 10101000 = a8<br>
Result: <b>a8bb:ccff:fedd:eeff</b><br>
Full IPv6: 2001:db8::<b>a8bb:ccff:fedd:eeff</b>/128<br><br>
<b>IPv6 address types:</b><br>
• <b>Link-local (fe80::/10):</b> Auto-configured on every interface. Only valid on local segment. Used for NDP, OSPF, routing protocol next-hops.<br>
• <b>Global Unicast (2000::/3):</b> Routable on internet. Assigned by ISP. Prefix typically /48 to /64.<br>
• <b>Unique Local (fc00::/7):</b> RFC1918 equivalent. Not routable on internet. fc00:: or fd00::.<br>
• <b>Multicast (ff00::/8):</b> ff02::1=all nodes · ff02::2=all routers · ff02::5=OSPF · ff02::6=OSPF DR · ff02::9=RIPng<br>
• <b>/128:</b> Host route (single address) · <b>::/0</b> = default route<br><br>
<b>DAD (Duplicate Address Detection):</b> Before using any address, host sends NS with src=:: (unspecified) to its own solicited-node multicast. If any device replies with NA → address conflict → dad failure logged.<br><br>
<b>SLAAC process:</b> 1) Host sends Router Solicitation (RS, type 133) to FF02::2 (all routers). 2) Router replies with RA (type 134)... to FF02::1 (all nodes) containing the /64 prefix. 3) Host combines prefix + EUI-64 (generated from MAC) to form its full /128 address. 4) Host runs DAD (Duplicate Address Detection) by sending NS for its own address.`,
    svg: () => D.defs()+
      D.rt('R1',120,200,'#f39c12','fe80::1')+
      D.pc('PC1',390,130,'#555','no addr yet')+D.pc('PC2',390,220,'#555','no addr yet')+D.pc('PC3',390,310,'#555','no addr yet')+

      D.pkt(148,196,362,148,'#f39c12',0)+D.pkt(148,200,362,224,'#f39c12',0.5)+
      `<rect x="30" y="370" width="260" height="28" rx="6" fill="#fff3e022" stroke="#f39c12" stroke-width="1"/>
       <text x="160" y="389" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#f39c12">RA: prefix=2001:db8::/64 · flags</text>`+
      `<rect x="430" y="355" width="185" height="40" rx="6" fill="#1a6fdb0e" stroke="#1a6fdb" stroke-width="1"/>
       <text x="523" y="371" text-anchor="middle" font-family="Syne" font-size="9" font-weight="700" fill="#1a6fdb">EUI-64 from MAC</text>
       <text x="523" y="385" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#555">aa:bb:cc:ff:fe:dd:ee:ff</text>`+
      D.info(430,395,185,'Final address',['2001:db8::','aabb:ccff','fedd:eeff/128','','show ipv6 neighbors'],'#27ae60')+
      D.info(30,400,390,'ICMPv6 Types to Know',['Type 133: Router Solicitation (RS) · host→FF02::2','Type 134: Router Advertisement (RA) · router→FF02::1','Type 135: Neighbour Solicitation (NS) · like ARP request','Type 136: Neighbour Advertisement (NA) · like ARP reply'],'#8e44ad')
  }],
  keys:[
    {l:'NS (type 135)',v:'Neighbour Solicitation — like ARP request. To solicited-node multicast.',t:''},
    {l:'NA (type 136)',v:'Neighbour Advertisement — like ARP reply. Unicast response.',t:''},
    {l:'RA (type 134)',v:'Router Advertisement — announces prefix for SLAAC. Sent to FF02::1.',t:''},
    {l:'SLAAC',v:'Prefix from RA + EUI-64 from MAC = full /128. No DHCP needed.',t:'good'},
    {l:'DAD',v:'Duplicate Address Detection — NS sent to own address to verify uniqueness',t:''},
    {l:'No broadcast in IPv6',v:'FF02::1=all nodes, FF02::2=all routers, FF02::5=OSPF, FF02::6=OSPF DR',t:'bad',why:'IPv6 eliminates broadcast entirely. Every function that used broadcast in IPv4 (ARP, DHCP discover, routing updates) now uses targeted multicast. This dramatically reduces unnecessary traffic on large segments.',cli:'<span class="cli-comment">! IPv6 multicast groups to know:</span>\n<span class="cli-comment">! FF02::1   = All IPv6 nodes (like 255.255.255.255)</span>\n<span class="cli-comment">! FF02::2   = All IPv6 routers</span>\n<span class="cli-comment">! FF02::5   = All OSPFv3 routers (was 224.0.0.5)</span>\n<span class="cli-comment">! FF02::6   = OSPFv3 DR/BDR (was 224.0.0.6)</span>\n<span class="cli-comment">! FF02::1:FFxx:xxxx = Solicited-node (NDP)</span>\nR1# <span class="cli-cmd">show ipv6 interface Gi0/0</span>\n<span class="cli-comment">  Joined group address(es): FF02::1 FF02::2 FF02::1:FFxx:xxxx</span>',tip:'Every IPv6 interface automatically joins FF02::1 (all nodes) and its own solicited-node multicast group.',tt:'bad'},
  ]
},

/* ── Static Routing ── */
{ num:'08', title:'Static Routing & Routing Fundamentals',
  desc:'Static routes are manually configured paths with AD=1. They are predictable, use no bandwidth for updates, and are ideal for stub networks and default routes.',
  steps:[
  { label:'Step 1 — How Routers Forward Packets',
    html:`<b>Administrative Distance (AD) — memorise this table:</b><br>
Connected=0 · Static=1 · EIGRP summary=5 · eBGP=20 · EIGRP internal=90 · IGRP=100 · <b>OSPF=110</b> · IS-IS=115 · RIP=120 · EIGRP external=170 · iBGP=200 · Unknown=255(unusable)<br><br>
<b>Longest prefix match</b> works left-to-right on the binary address. 192.168.1.50 in binary: 11000000.10101000.00000001.00110010. A /24 matches the first 24 bits — more specific than /16 (16 bits). More bits matched = more specific = always wins regardless of protocol.<br><br>
<b>Recursive lookup:</b> If next-hop is not directly connected, router must look up the next-hop address too. If the next-hop is unreachable, the static route is NOT installed in the routing table (it stays in config but won't appear in <code>show ip route</code>).<br><br>
<b>Null0 route:</b> <code>ip route 10.0.0.0 255.0.0.0 null0</code> — drops packets matching this prefix. Used to prevent routing loops when summarising. Traffic hits summary route → no more specific match → null0 → dropped.`,
    svg: () => D.defs()+
      D.rt('R1',120,200,'#f39c12')+
      D.info(200,100,320,'R1 Routing Table',['C  10.0.1.0/30   via Gi0/0 (connected)','O  172.16.0.0/16 via 10.0.1.2 [110/2]','S  192.168.1.0/24 via 10.0.1.2 [1/0]','S* 0.0.0.0/0     via 10.0.1.2 [1/0]','','Dest: 192.168.1.50','→ /24 matches (most specific)','→ Forward via 10.0.1.2'],'#1a6fdb')+
      D.rt('R2',530,200,'#f39c12')+D.pc('PC',530,320,'#27ae60','192.168.1.50')+
      D.ln(148,204,200,190,'b')+D.ln(520,220,200,210,'b')+
      D.pkt(148,204,200,190,'#1a6fdb',0)+
      D.cb(80,380,480,28,'Longest prefix match: /24 > /16 > /8 > default /0 · ties broken by AD then metric')
  },
  { label:'Step 2 — Static Route Config & Floating Static',
    html:`<b>Static route syntax:</b> <code>ip route [network] [mask] [next-hop OR exit-int]</code>. Floating static: give backup route a higher AD (e.g. 210) so it hides behind OSPF (AD=110). When OSPF fails, the floating static appears automatically.`,
    svg: () => D.defs()+
      D.rt('R1',120,190,'#f39c12')+D.rt('R2',500,190,'#f39c12')+
      D.ln(148,184,474,184,'b')+`<text x="310" y="176" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60">OSPF [AD=110] — ACTIVE</text>`+
      D.ln(148,200,474,200,'-')+`<text x="310" y="212" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#8892a4">ip route ... 210 — FLOATING (hidden while OSPF up)</text>`+

  keys:[
    {l:'AD Table',v:'Connected=0 · Static=1 · OSPF=110 · RIP=120 — lower wins',why:'When multiple protocols have a route to same destination, lowest AD wins. Static (AD=1) beats OSPF (110) beats RIP (120). Routing table shows [AD/metric] in brackets.',cli:'<span class="cli-comment">! [110/10] = AD=110, metric=10</span>\nshow ip route\nshow ip route 192.168.1.0\n<span class="cli-comment">! S=static [1/0] O=OSPF [110/x]</span>',tip:'AD is local to the router — different from routing protocol metrics.'},
    {l:'Default Route',v:'ip route 0.0.0.0 0.0.0.0 [next-hop] — matches everything',why:'The last-resort route. Matches any destination not matched by a more specific route. Without it, unknown destinations are silently dropped.',cli:'ip route 0.0.0.0 0.0.0.0 203.0.113.1\nshow ip route 0.0.0.0\n<span class="cli-comment">! Shows as S* in routing table</span>',tip:'S* in routing table = default static route. The gateway of last resort.',tt:'good'},
    {l:'Floating Static',v:'Set AD higher than dynamic protocol to create backup route',why:'AD=210 > OSPF=110, so floating static hides while OSPF works. When OSPF fails, floating static appears in table automatically.',cli:'ip route 0.0.0.0 0.0.0.0 10.0.0.2 210\n<span class="cli-comment">! Hidden while OSPF works</span>\n<span class="cli-comment">! Appears when OSPF fails</span>\nshow ip route 0.0.0.0',tip:'Floating static won\'t appear in show ip route while the dynamic route exists.'},
    {l:'Verify',v:'show ip route — S=static, S*=default, [AD/metric]',why:'Every route shows source letter, [AD/metric], and next-hop. If a static route is missing, the next-hop is probably unreachable.',cli:'show ip route\nshow ip route static\nshow ip route 192.168.1.0\n<span class="cli-comment">! Ping next-hop to verify reachability</span>\nping 10.0.0.2',tip:'Route in config ≠ in routing table. Always verify with show ip route.',tt:'bad'},
    {l:'Next-hop Reachable',v:'Route not installed if next-hop is unreachable',why:'A static route only appears in the routing table if the next-hop IP is reachable. If the interface goes down and next-hop becomes unreachable, the static route disappears.',cli:'ping 10.0.0.2\nshow ip interface brief  ! check interface status\nshow ip route 10.0.0.2  ! verify next-hop reachable',tip:'Using exit-interface instead of next-hop installs route even when link is down — can cause issues.',tt:'warn',t:'warn'},
    {l:'Null0 Route',v:'Discard route — drops packets, prevents routing loops',why:'ip route x.x.x.0/y Null0 drops all packets matching that prefix. Used with summarisation to prevent routing loops to unassigned addresses in the summary range.',cli:'ip route 10.0.0.0 255.0.0.0 Null0\nshow ip route 10.0.0.0  ! shows "directly connected, Null0"',tip:'Null0 generates ICMP Unreachable back to sender by default.'},
    {l:'Next-hop reachable',v:'Route not installed in table if next-hop is unreachable',t:'warn',why:'A static route in the running-config does NOT mean it is in the routing table. If the next-hop address is unreachable (e.g. interface is down), IOS silently removes the route from the active table. Always verify with show ip route — not show running-config.',cli:'<span class="cli-comment">! Route in config but NOT in table:</span>\nR1# <span class="cli-cmd">show running-config | include ip route</span>\n  ip route 192.168.1.0 255.255.255.0 10.0.0.2  ← in config\nR1# <span class="cli-cmd">show ip route 192.168.1.0</span>\n  % Network not in table  ← NOT installed!\n<span class="cli-comment">! Reason: 10.0.0.2 is unreachable</span>\nR1# <span class="cli-cmd">ping 10.0.0.2</span>\n  !!!!!  or  .....  (dots = unreachable)',tip:'Use a floating static with a null0 route as backup: ip route 0.0.0.0 0.0.0.0 Null0 254 to prevent blackholing.',tt:'warn'},
    {l:'Exam trap',v:'Route in config ≠ in routing table. Always verify with show ip route.',t:'bad'},
  ]
},

{ num:'10', title:'Inter-VLAN Routing',
  desc:'Layer 2 switches cannot route between VLANs. Traffic crossing VLAN boundaries needs a router or L3 switch. Three methods: Router-on-a-Stick (ROAS), Layer 3 SVI, or separate physical interfaces.',
  steps:[
  { label:'Step 1 — Router-on-a-Stick',
    html:`<b>ROAS:</b> One trunk link to router. Router uses sub-interfaces (G0/0.10, G0/0.20) with encapsulation dot1q. Each sub-interface has the gateway IP for its VLAN. Traffic goes UP to router, gets routed, comes back DOWN.`,
    svg: () => D.defs()+
      D.rt('R1',320,75,'#f39c12')+
      `<text x="210" y="60" font-family="JetBrains Mono" font-size="7" fill="#f39c12">G0/0.10: 192.168.10.1/24  encap dot1q 10</text>`+
      `<text x="210" y="72" font-family="JetBrains Mono" font-size="7" fill="#f39c12">G0/0.20: 192.168.20.1/24  encap dot1q 20</text>`+
      D.sw('SW1',320,220,'#1a6fdb')+
      D.ln(320,102,320,202,'b')+D.tag(330,155,'V10','#1a6fdb')+D.tag(362,155,'V20','#27ae60')+
      D.pkt(320,102,320,202,'#1a6fdb',0)+D.pkt(320,202,320,102,'#27ae60',0.8)+
      D.pc('PC-V10',105,325,'#1a6fdb','192.168.10.10')+D.pc('PC-V20',535,325,'#27ae60','192.168.20.10')+
      D.ln(135,309,255,232)+D.ln(385,232,505,309)+
      D.cb(100,390,440,28,'Con: single link = bottleneck · Pro: simple, low cost · VLAN must exist on switch')
  },
  { label:'Step 2 — L3 Switch SVIs',
    html:`<b>Layer 3 SVIs:</b> Enable <code>ip routing</code> on L3 switch. Create VLAN interfaces with gateway IPs. Routing happens in ASIC at wire speed — no external router needed. SVI only comes up when: VLAN exists in DB + active access port in VLAN.`,
    svg: () => D.defs()+
      D.sw('L3-SW',320,200,'#8e44ad')+
      `<text x="320" y="182" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8e44ad">ip routing  ·  int vlan 10: 192.168.10.1/24  ·  int vlan 20: 192.168.20.1/24</text>`+
      D.pc('PC1',80,150,'#1a6fdb','10.10')+D.pc('PC2',80,255,'#1a6fdb','10.11')+
      D.pc('PC3',560,150,'#27ae60','20.10')+D.pc('PC4',560,255,'#27ae60','20.11')+
      D.ln(144,154,285,205,'b')+D.ln(144,259,285,215,'b')+
      D.ln(355,205,496,154,'g')+D.ln(355,215,496,259,'g')+
      D.pkt(144,154,285,205,'#1a6fdb',0)+D.pkt(355,205,496,154,'#27ae60',0.6)+
      D.cb(100,355,440,28,'SVI requirements: ip routing + VLAN in DB + active port in VLAN = up/up')
  }],
  keys:[
    {l:'ROAS',v:'One trunk link + sub-interfaces — simple, single point of failure',why:'Sub-interfaces G0/0.10, G0/0.20 etc. Each needs encapsulation dot1q and a gateway IP. Traffic goes up to router, gets routed, comes back down. Single link = bottleneck.',cli:'interface G0/0.10\n encapsulation dot1q 10\n ip address 192.168.10.1 255.255.255.0\ninterface G0/24  ! switch side\n switchport mode trunk',tip:'Single trunk link = bottleneck. L3 switch SVIs are much better for campus.',tt:'warn',t:'warn'},
    {l:'L3 SVI',v:'ip routing + VLAN SVIs — wire-speed ASIC routing, best for campus',why:'L3 switches route in hardware ASIC — microsecond latency at line rate. Each VLAN gets an SVI as its gateway. No external router needed.',cli:'ip routing\ninterface vlan 10\n ip address 192.168.10.1 255.255.255.0\n no shutdown\ninterface vlan 20\n ip address 192.168.20.1 255.255.255.0\n no shutdown',tip:'ip routing is required. Without it SVIs come up but no routing between VLANs.',tt:'bad',t:'good'},
    {l:'SVI Condition',v:'ip routing + VLAN in DB + active port in VLAN = SVI up/up',why:'All three conditions required. Miss any one and SVI stays down. Check each condition with show commands.',cli:'show interface vlan 10  ! is SVI up?\nshow vlan id 10  ! VLAN active?\nshow interface status  ! port connected?\nshow ip routing  ! ip routing enabled?',tip:'SVI shows "up/down" = VLAN exists but no active port assigned to it.',tt:'warn'},
    {l:'encapsulation',v:'encapsulation dot1q 10 — required on each sub-interface',why:'Tells the sub-interface which VLAN to process. Without it the sub-interface doesn\'t know which VLAN it belongs to. For native VLAN (untagged): add "native" keyword.',cli:'interface G0/0.10\n encapsulation dot1q 10\n ip address 192.168.10.1 255.255.255.0\n<span class="cli-comment">! Native VLAN (untagged):</span>\ninterface G0/0.1\n encapsulation dot1q 1 native',tip:'Sub-interface number doesn\'t have to match VLAN ID — but it should for clarity.'},
    {l:'Verify',v:'show ip route — C routes per SVI confirm routing is working',why:'Working inter-VLAN routing shows a C (Connected) route per SVI network. If missing, ip routing is probably not enabled.',cli:'show ip route\n<span class="cli-comment">! Should show:</span>\n<span class="cli-comment">! C 192.168.10.0/24 via Vlan10</span>\n<span class="cli-comment">! C 192.168.20.0/24 via Vlan20</span>\nping 192.168.20.1 source vlan 10',tip:'Missing C routes = ip routing not enabled.',tt:'good'},
    {l:'Exam Trap',v:'Forgetting ip routing = SVIs up but no routing happens',why:'Most common inter-VLAN mistake. Without "ip routing" the L3 switch is a Layer 2 switch. SVIs come up (can answer pings) but no packets route between them.',cli:'ip routing  ! the magic command\nshow running-config | include ip routing  ! verify it\'s there',tip:'"ip routing" absent from running-config = no inter-VLAN routing regardless of SVIs.',tt:'bad',t:'bad'}
  ]
},
/* ── Subnetting ── */
{ num:'11', title:'IPv4 Subnetting',
  desc:'Subnetting divides address space into smaller networks. The block size method is the fastest exam approach: block = 256 − last non-zero subnet mask octet. Subnets repeat at every block interval.',
  steps:[
  { label:'Step 1 — Block Size Method',
    html:`<b>Block size method:</b> /26 mask = 255.255.255.192. Last octet = 192. Block = 256−192 = <b>64</b>. Subnets start at multiples of 64: .0, .64, .128, .192.<br><br>
<b>Finding which subnet an IP belongs to:</b><br>
IP: 192.168.1.100 /26 → block=64 → subnets: .0, .64, .128...<br>
100 ÷ 64 = 1 remainder 36 → subnet is .64 → network=.64, broadcast=.127, hosts=.65-.126 ✓<br><br>
<b>Complex prefix trick:</b> /19 = 255.255.224.0 → block in 3rd octet = 256-224=32<br>
Subnets: 0.0, 32.0, 64.0, 96.0... 172.16.<b>33</b>.50 → 33÷32=1 rem 1 → subnet 172.16.32.0/19<br><br>
<b>VLSM (Variable Length Subnet Masking):</b> Assign different prefix lengths to different subnets based on need. Example: WAN link needs 2 hosts → /30. Server LAN needs 50 hosts → /26. Branch LAN needs 200 hosts → /24. Classful routing (RIP v1) doesn't support VLSM — OSPF, EIGRP, RIP v2 do.`,
    svg: () => D.defs()+
      `<text x="320" y="40" text-anchor="middle" font-family="Syne" font-size="14" font-weight="800" fill="#0a0c14">192.168.1.0/26 — Block=64 — 62 hosts each</text>`+
      D.info(20,60,140,'Subnet 1',['Net: .0/26','First: .1','Last:  .62','Bcast: .63','Hosts: 62'],'#1a6fdb')+
      D.info(168,60,140,'Subnet 2',['Net: .64/26','First: .65','Last:  .126','Bcast: .127','Hosts: 62'],'#27ae60')+
      D.info(316,60,140,'Subnet 3',['Net: .128/26','First: .129','Last:  .190','Bcast: .191','Hosts: 62'],'#8e44ad')+
      D.info(464,60,140,'Subnet 4',['Net: .192/26','First: .193','Last:  .254','Bcast: .255','Hosts: 62'],'#f39c12')+
      D.info(20,260,600,'CIDR Reference',['Prefix  Mask                  Total  Usable  Block','  /24   255.255.255.0          256    254     256','/25   255.255.255.128         128    126     128','/26   255.255.255.192          64     62      64','/27   255.255.255.224          32     30      32','/28   255.255.255.240          16     14      16','/29   255.255.255.248           8      6       8','/30   255.255.255.252           4      2       4  ← P2P'],'#1a6fdb')
  }],
  keys:[
    {l:'Block Size Method',v:'256 − last mask octet = block — subnets at multiples',why:'Fastest exam method. /26 = 255.255.255.192. 256-192=64. Subnets: .0,.64,.128,.192. Find which subnet IP belongs to: IP÷block (floor) × block.',cli:'<span class="cli-comment">! 192.168.1.100 /26: block=64</span>\n<span class="cli-comment">! 100÷64=1(floor)×64=64 → subnet .64</span>\n<span class="cli-comment">! Network=.64 Broadcast=.127</span>',tip:'Subnet = floor(IP÷block) × block. Broadcast = subnet + block - 1.',tt:'good'},
    {l:'Usable Hosts',v:'2^(host bits) − 2 — subtract network + broadcast',why:'Two addresses always reserved: network (all 0s) and broadcast (all 1s). /26 = 6 host bits = 2^6=64 total = 62 usable.',cli:'<span class="cli-comment">! /24=254 /25=126 /26=62 /27=30</span>\n<span class="cli-comment">! /28=14 /29=6 /30=2 (P2P)</span>',tip:'Memorise: /24=254, /25=126, /26=62, /27=30, /28=14, /29=6, /30=2',tt:'good'},
    {l:'/30 for P2P',v:'4 total, 2 usable — perfect for router-to-router links',why:'P2P links need exactly 2 IPs. /30 wastes only 2 addresses (network+broadcast). /24 would waste 252. /31 (RFC 3021) has 0 waste but less widely supported.',cli:'interface G0/0\n ip address 10.0.0.1 255.255.255.252  ! /30\n<span class="cli-comment">! Other end: 10.0.0.2 /30</span>',tip:'/31 (2 addresses, 0 wasted) is also valid for P2P per RFC 3021.',t:'good'},
    {l:'Wildcard Mask',v:'255.255.255.255 − subnet mask — used in ACLs and OSPF',why:'/24 = 255.255.255.0 → wildcard = 0.0.0.255. Shortcuts: "host" = 0.0.0.0, "any" = 255.255.255.255.',cli:'<span class="cli-comment">! /24 → 0.0.0.255</span>\n<span class="cli-comment">! /26 → 0.0.0.63</span>\n<span class="cli-comment">! /16 → 0.0.255.255</span>\nnetwork 192.168.1.0 0.0.0.255 area 0',tip:'0 bit = must match, 1 bit = ignore (opposite of subnet mask).',tt:'warn',t:'warn'},
    {l:'VLSM',v:'Different prefix lengths per subnet — efficient address allocation',why:'Assign /30 for WAN links (2 hosts), /26 for branch LANs (62 hosts), /24 for large sites (254 hosts). RIPv1 doesn\'t support VLSM. OSPF, EIGRP, RIPv2 do.',cli:'<span class="cli-comment">! Efficient allocation of 10.0.0.0/8:</span>\n<span class="cli-comment">! DC (1000 hosts): 10.0.0.0/22</span>\n<span class="cli-comment">! Branch (50 hosts): 10.0.4.0/26</span>\n<span class="cli-comment">! WAN links: 10.0.5.0/30 etc.</span>',tip:'RIPv1 = classful (no VLSM). All modern IGPs support VLSM.',tt:'warn',t:'good'},
    {l:'Exam Trap',v:'Network + broadcast addresses are NOT usable — subtract 2',why:'/26 = 64 total addresses but only 62 usable. The .0 (network) and .63 (broadcast) cannot be assigned to any host.',cli:'<span class="cli-comment">! 192.168.1.0/24:</span>\n<span class="cli-comment">! Network:   .0  ← not assignable</span>\n<span class="cli-comment">! First host: .1</span>\n<span class="cli-comment">! Last host:  .254</span>\n<span class="cli-comment">! Broadcast: .255 ← not assignable</span>',tip:'If asked "usable hosts in /26?" = 62, not 64.',tt:'bad',t:'bad'}
  ]
},
/* ── HSRP ── */
{ num:'12', title:'HSRP — First Hop Redundancy',
  desc:'HSRP (RFC 2281) provides first-hop redundancy. Two routers share a virtual IP and MAC. Clients use the VIP as their default gateway. If the Active router fails, Standby takes over within seconds.',
  steps:[
  { label:'Step 1 — Active/Standby Normal Operation',
    html:`<b>Virtual MAC construction:</b> 0000.0c07.ac<b>XX</b> where XX = group number in hex.<br>
Group 1 = 01 → MAC = 0000.0c07.ac<b>01</b><br>
Group 10 = 0a → MAC = 0000.0c07.ac<b>0a</b><br>
Group 255 = ff → MAC = 0000.0c07.ac<b>ff</b><br>
Maximum HSRP v1 groups: 0-255. HSRP v2 groups: 0-4095, uses MAC 0000.0c9f.fXXX.<br><br>
<b>HSRP Tracking:</b> <code>standby 1 track Gi0/1 20</code> — if Gi0/1 goes down, reduce priority by 20. If Active had priority 110, it drops to 90 (below Standby's 100) → triggers failover even without device failure. Essential for dual-uplink designs.<br><br>
<b>FHRP comparison:</b><br>
HSRP: Cisco proprietary · v1 UDP 1985 · v2 UDP 1985 · 1 Active at a time<br>
VRRP: Open standard (RFC 5798) · UDP multicast 224.0.0.18 · 1 Master<br>
GLBP: Cisco proprietary · 1 AVG + up to 4 AVFs · all routers active simultaneously · load balanced<br><br>
<b>Hellos:</b> every 3s to 224.0.0.2 UDP 1985. Hold timer=10s. Tune: <code>standby 1 timers 1 3</code> for faster failover.`,
    svg: () => D.defs()+
      D.rt('R1',130,170,'#27ae60','10.0.0.2')+`<text x="130" y="145" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60">ACTIVE  pri=110</text>`+
      D.rt('R2',510,170,'#8892a4','10.0.0.3')+`<text x="510" y="145" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#8892a4">STANDBY  pri=100</text>`+
      `<rect x="262" y="145" width="116" height="54" rx="8" fill="#fff3e022" stroke="#f39c12" stroke-width="1.5"/>
       <text x="320" y="165" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#f39c12">VIP 10.0.0.1</text>
       <text x="320" y="180" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#555">0000.0c07.ac01</text>
       <text x="320" y="192" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">virtual MAC</text>`+
      D.ln(158,172,260,172,'b')+D.ln(378,172,482,172)+
      D.bpdu(378,172,482,172,0,'Hello','#8892a4')+
      D.pc('C1',60,320)+D.pc('C2',200,320)+D.pc('C3',320,320)+
      D.ln(78,304,100,198,'g')+D.ln(212,304,200,198,'g')+D.ln(325,304,295,200,'g')+
      D.cb(90,380,460,28,'Clients gateway = 10.0.0.1 (VIP) — never changes during failover')
  },
  { label:'Step 2 — Failover & Preempt',
    html:`<b>R1 fails:</b> R2 stops receiving hellos. After hold timer (10s default), R2 declares Active, sends Gratuitous ARP for the VIP, starts forwarding. <b>Preempt:</b> When R1 recovers, it will NOT retake Active role unless <code>standby 1 preempt</code> is configured. Always configure preempt on the high-priority router.`,
    svg: () => D.defs()+
      D.rt('R1',130,170,'#e03e3e')+`<text x="130" y="145" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">✗ FAILED</text>`+
      D.rt('R2',510,170,'#27ae60')+`<text x="510" y="145" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60">→ NOW ACTIVE</text>`+
      `<rect x="262" y="145" width="116" height="54" rx="8" fill="#fff3e022" stroke="#f39c12" stroke-width="2"/>
       <text x="320" y="165" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#f39c12">VIP 10.0.0.1</text>
       <text x="320" y="182" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#27ae60">→ now at R2</text>`+
      D.ln(378,172,482,172,'b')+D.pkt(378,172,482,172,'#27ae60',0)+
      D.pc('C1',60,320)+D.pc('C2',200,320)+D.pc('C3',320,320)+
      D.ln(78,304,460,190,'g')+D.ln(212,304,465,193,'g')+D.ln(325,304,470,196,'g')+
      D.info(30,350,580,'HSRP Config (R1)',['standby 1 ip 10.0.0.1','standby 1 priority 110','standby 1 preempt        ← R1 retakes Active when it recovers','standby 1 track Gi0/1 20 ← reduces priority by 20 if Gi0/1 fails'],'#27ae60')
  }],
  keys:[
    {l:'Virtual MAC',v:'0000.0c07.acXX — XX = group number in hex',why:'Fixed virtual MAC per group number. Group 1=ac01, Group 10=ac0a, Group 255=acff. When failover occurs, no ARP update needed for most devices since the virtual MAC stays the same.',cli:'interface G0/0\n standby 1 ip 10.0.0.1\nshow standby brief\n<span class="cli-comment">! VMAC: 0000.0c07.ac01 for group 1</span>\nshow arp | include 0c07',tip:'HSRP v2 uses MAC 0000.0c9f.fXXX (12-bit group). v1 max 255 groups.'},
    {l:'Hello/Hold',v:'3s hello / 10s hold — tune for faster failover',why:'Default hold = 10s = 10 seconds of downtime after failure. Tune down: hello=1s, hold=3s. Hold must be ≥ 3× hello. HSRP v2 supports millisecond timers.',cli:'standby 1 timers 1 3  ! hello=1s hold=3s\n<span class="cli-comment">! Millisecond (HSRP v2):</span>\nstandby version 2\nstandby 1 timers msec 200 msec 700',tip:'Hold timer = minimum 3× hello timer.',tt:'warn'},
    {l:'Preempt',v:'NOT default — must add standby 1 preempt explicitly',why:'Without preempt: after R1 fails and R2 takes over, R1 comes back but STAYS standby — R2 remains active despite lower priority. Always add preempt on the high-priority router.',cli:'standby 1 ip 10.0.0.1\nstandby 1 priority 110\nstandby 1 preempt  ! REQUIRED\nstandby 1 preempt delay minimum 60  ! wait 60s before preempting',tip:'Without preempt, higher-priority router doesn\'t retake active role after recovery.',tt:'bad',t:'bad'},
    {l:'Priority',v:'Default=100, higher wins, range 0-255',why:'Higher priority = Active router. Tie = highest interface IP wins. Configure preempt so high-priority router retakes active role when it recovers.',cli:'standby 1 priority 110\nstandby 1 preempt\nshow standby brief  ! shows P for preempt flag',tip:'Tie in priority: highest IP address on the HSRP interface wins.'},
    {l:'Verify',v:'show standby brief',why:'Shows interface, group, priority, state (Active/Standby/Listen), virtual IP, active router IP, standby router IP.',cli:'show standby brief\nshow standby\nshow standby G0/0 1\ndebug standby events',tip:'show standby brief: "P" in flags = preempt configured. "Active" = this router is active.',tt:'good'},
    {l:'GLBP',v:'Cisco active/active — all routers forward simultaneously',why:'GLBP gives each router a unique virtual MAC, distributing load across all gateways simultaneously. One AVG assigns VMACs to AVFs.',cli:'interface G0/0\n glbp 1 ip 10.0.0.1\n glbp 1 priority 110\n glbp 1 preempt\n glbp 1 load-balancing round-robin\nshow glbp brief',tip:'GLBP = load balanced active/active. HSRP = active/standby. VRRP = open standard.'}
  ]
},
/* ── DNS ── */
{ num:'16', title:'DNS — Domain Name System',
  desc:'DNS translates human-readable names to IP addresses. Hierarchical system: resolver → root servers → TLD servers → authoritative servers. Results cached per TTL to reduce load.',
  steps:[
  { label:'Step 1 — DNS Resolution Hierarchy',

    {l:'UDP port 53',v:'Standard DNS queries — connectionless, fast, under 512 bytes',t:'',
     why:'DNS uses UDP because it is fast and connectionless. A query is a single packet out, a single packet back. No handshake overhead. If the response exceeds 512 bytes, DNS falls back to TCP automatically (the TC truncation bit is set).',
     cli:'<span class="cli-comment">! Configure DNS server on Cisco device</span>\nip name-server 8.8.8.8\nip name-server 1.1.1.1\n<span class="cli-comment">! Enable DNS lookup (on by default)</span>\nip domain-lookup\n<span class="cli-comment">! Test from CLI</span>\nping www.cisco.com',
     tip:'ip domain-lookup is ON by default. Turning it off stops the long delay when you mistype a command (IOS tries to DNS-resolve it).',tt:'warn'},
    {l:'TCP port 53',v:'Zone transfers + responses over 512 bytes (EDNS allows larger UDP)',t:'',
     why:'Zone transfers replicate entire DNS zone files between primary and secondary nameservers. These can be megabytes — TCP provides reliable ordered delivery. Modern DNS with EDNS0 extension can use UDP up to 4096 bytes, reducing TCP fallback.',
     cli:'<span class="cli-comment">! Block zone transfers (security)</span>\nip access-list extended BLOCK-ZONE-XFER\n deny tcp any any eq 53\n permit ip any any\n<span class="cli-comment">! Zone transfers should be restricted</span>\n<span class="cli-comment">! to authorised secondary servers only</span>',
     tip:'Zone transfer attacks expose your entire DNS database. Always restrict zone transfers by IP.',tt:'warn'},
    {l:'A / AAAA record',v:'A: hostname → IPv4 · AAAA: hostname → IPv6',t:'good',
     why:'A records are the most queried DNS records. Every web request starts with an A record lookup unless the IP is already cached. AAAA (quad-A) is the IPv6 equivalent. One hostname can have multiple A records for load balancing (round-robin DNS).',
     cli:'<span class="cli-comment">! Verify DNS resolution</span>\nnslookup www.cisco.com\n<span class="cli-comment">! Or from IOS</span>\nshow hosts\n<span class="cli-comment">! Static host entry (no DNS needed)</span>\nip host R2 10.0.0.2',
     tip:'ip host creates a static DNS entry on the device — useful for lab without DNS server.',tt:'good'},
    {l:'TTL',v:'Time-to-Live: how long resolvers cache the record (seconds)',t:'',
     why:'TTL balances freshness vs performance. Low TTL (60-300s): quick propagation when changing IPs. High TTL (86400s = 1 day): fewer DNS queries, less load. Before a major change (moving a server), reduce TTL 24-48 hours in advance.',
     cli:'<span class="cli-comment">! DNS records in a zone file:</span>\nwww  300  IN  A  203.0.113.10\n     <--- TTL=300s (5 min) ------^\n<span class="cli-comment">! MX record (mail server)</span>\n@    3600  IN  MX  10  mail.example.com',
     tip:'Plan TTL reduction before changes: lower to 300s a day before, make change, then raise back to 86400.',tt:''},
    {l:'Cisco DNS config',v:'<code>ip name-server</code> + <code>ip domain-name</code> for FQDN resolution',t:'',
     why:'Without ip name-server, the device cannot resolve hostnames. Without ip domain-name, the device appends nothing to bare hostnames. Both are needed for proper DNS-dependent features like SSH (hostname.domain = RSA key label).',
     cli:'ip name-server 8.8.8.8\nip name-server 8.8.4.4\nip domain-name netmind.lab\n<span class="cli-comment">! Test resolution</span>\nshow hosts\n<span class="cli-comment">! Clear DNS cache</span>\nclear host *',
     tip:'ip domain-name also affects SSH key generation — must match what you intend for the key label.',tt:''},
    {l:'Exam trap',v:'DNS queries = UDP 53. Zone transfers = TCP 53. Both use port 53.',t:'bad',
     why:'The protocol changes (UDP vs TCP) but the port stays 53 in both cases. This trips up students who think TCP 53 is a different service. It is the same DNS service — TCP is used when the response is too large for UDP.',
     cli:'<span class="cli-comment">! ACL that correctly allows DNS</span>\npermit udp any any eq 53\npermit tcp any any eq 53\n<span class="cli-comment">! Both lines needed for full DNS</span>\n<span class="cli-comment">! Missing TCP blocks zone transfers</span>',
     tip:'If you block TCP 53 in an ACL, you break zone transfers and large DNS responses.',tt:'bad'},
  ]
},

{ num:'17', title:'NTP — Network Time Protocol',
  desc:'NTP synchronises device clocks using a hierarchical stratum system. Critical for syslog correlation, certificates, and Kerberos authentication (5-minute maximum clock skew). Uses UDP 123.',
  steps:[
  { label:'Step 1 — NTP Stratum Hierarchy',
    html:`<b>Why clocks drift:</b> Crystal oscillators in hardware run at slightly different frequencies due to temperature, voltage, and aging. A typical PC clock drifts 15-30 ppm (parts per million) = ~1-2 seconds per day. NTP corrects this gradually by slewing (speeding up/slowing down) the clock rather than jumping — sudden jumps break log timestamps and Kerberos.<br><br>
<b>NTP command comparison:</b><br>
<code>ntp server 216.239.35.0</code> — sync this device FROM an upstream server (client mode)<br>
<code>ntp peer 10.0.0.2</code> — bidirectional sync (both can be source for each other)<br>
<code>ntp master 3</code> — this device is authoritative at stratum 3 (even if not sync'd to upstream)<br>
<code>ntp authenticate</code> + <code>ntp authentication-key 1 md5 SECRET</code> — prevents rogue NTP servers<br><br>
<b>show ntp status output to understand:</b><br>
"Clock is synchronized, stratum 3" ← good<br>
"Clock is unsynchronized" ← check ntp server reachability<br>
"stratum 16" ← completely unsynchronised — fix immediately<br><br>
<b>Stratum levels:</b> Stratum 0 = atomic/GPS clock (reference, never directly accessible). Stratum 1 = directly connected to stratum 0. Each hop adds 1. Stratum 16 = unsynchronised (critical error). Always configure NTP — without it, log timestamps are meaningless.`,
    svg: () => D.defs()+
      `<rect x="215" y="30" width="210" height="48" rx="10" fill="#f39c1218" stroke="#f39c12" stroke-width="2"/>
       <text x="320" y="53" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#f39c12">Stratum 0 — GPS/Atomic</text>
       <text x="320" y="70" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#555">Reference clock (not network-accessible)</text>`+
      D.rt('S1 Stratum 1',155,155,'#27ae60')+D.rt('S2 Stratum 1',485,155,'#27ae60')+
      `<text x="155" y="132" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">pool.ntp.org</text>`+
      `<text x="485" y="132" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">time.google.com</text>`+
      D.rt('Core Stratum 2',320,245,'#1a6fdb')+
      `<text x="320" y="222" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">ntp master 2</text>`+
      D.rt('Branch S3',155,330,'#8e44ad')+D.rt('Access S3',485,330,'#8e44ad')+
      D.ln(290,78,180,128,'b')+D.ln(350,78,460,128,'b')+
      D.ln(195,170,298,220,'b')+D.ln(462,170,342,220,'b')+
      D.ln(298,260,178,305,'b')+D.ln(342,260,462,305,'b')+
      D.bpdu(290,78,180,128,0,'NTP','#f39c12')+D.bpdu(350,78,460,128,0.5,'NTP','#f39c12')+
      D.cb(80,388,480,22,'UDP 123  ·  Stratum 16 = unsynchronised  ·  Kerberos fails if drift > 5 minutes')
  }],
  keys:[
    {l:'Stratum 0',v:'Atomic/GPS — reference. Not directly accessible.',t:''},
    {l:'Stratum 16',v:'Unsynchronised. Fix immediately.',t:'bad'},
    {l:'UDP 123',v:'Block this = no NTP synchronisation',t:'warn'},
    {l:'ntp master',v:'<code>ntp master 3</code> — makes device authoritative at stratum 3',t:''},
    {l:'Verify',v:'<code>show ntp status</code> — "Clock is synchronized"',t:''},
    {l:'5-minute rule',v:'Kerberos auth fails if clock drift > 5 minutes. Windows AD uses Kerberos.',t:'bad',why:'Kerberos tickets include a timestamp. If the client and server clocks differ by more than 5 minutes, the ticket is considered invalid and authentication fails. This affects all Windows domain logins, 802.1X, and any Kerberos-based auth. NTP is not optional in a domain environment.',cli:'<span class="cli-comment">! Configure NTP client</span>\nR1(config)# <span class="cli-cmd">ntp server 216.239.35.0</span>\n<span class="cli-comment">! Set timezone correctly</span>\nR1(config)# <span class="cli-cmd">clock timezone AEST 10</span>\n<span class="cli-comment">! Verify sync (wait 5-10 mins after config)</span>\nR1# <span class="cli-cmd">show ntp status</span>\n  Clock is synchronized, stratum 3\nR1# <span class="cli-cmd">show clock</span>\nR1# <span class="cli-cmd">show ntp associations</span>',tip:'show ntp associations: * = synced source, + = candidate, ~ = configured, - = outlyer. You need at least one *.',tt:'bad'},
  ]

{ num:'20', title:'AAA — RADIUS vs TACACS+',
  desc:'AAA = Authentication (who?) + Authorisation (what?) + Accounting (what did they do?). RADIUS is the open standard for network access. TACACS+ is Cisco-proprietary for device administration.',
  steps:[
  { label:'Step 1 — RADIUS vs TACACS+ Comparison',
    html:`<b><code>aaa new-model</code></b> — this single command completely replaces the legacy line-password authentication method. Once enabled, ALL VTY and console login MUST use AAA method lists. If you enable aaa new-model without configuring a method list, you could lock yourself out. Always configure <code>aaa authentication login default local</code> as a minimum fallback BEFORE enabling aaa new-model.<br><br>
<b>Privilege levels:</b><br>
• Level 0: Very limited (logout, enable, disable, help, exit)<br>
• Level 1: User EXEC (show commands only, no config access) — default after login<br>
• Level 15: Privileged EXEC (full access, all show + config commands)<br>
Levels 2-14 can be customised. Set user level: <code>username admin privilege 15 secret pass</code>. Force level after auth: <code>aaa authorization exec default local</code>.<br><br>
<b>Method lists:</b> <code>aaa authentication login <b>default</b> group tacacs+ local</code> — "default" applies to all lines. Named lists apply only to specific lines: <code>line vty 0 15 → login authentication MY-LIST</code>.<br><br>
<b>Key difference:</b> RADIUS encrypts only the password field — username and all other attributes are cleartext. TACACS+ encrypts the ENTIRE body of every packet. RADIUS combines auth+authz into one response. TACACS+ separates them for granular control. Use RADIUS for 802.1X/VPN. Use TACACS+ for SSH device access.`,
    svg: () => D.defs()+
      D.info(20,50,295,'RADIUS',['Protocol: UDP 1812/1813','Encryption: PASSWORD ONLY','Standard: open (RFC 2865)','AAA: auth+authz combined','Best for: network access','  (802.1X Wi-Fi, VPN, dialup)','','radius server MYRAD',' address ipv4 10.0.0.5',' key MySharedSecret'],'#1a6fdb')+
      D.info(325,50,295,'TACACS+',['Protocol: TCP 49','Encryption: ENTIRE PACKET','Standard: Cisco proprietary','AAA: separated (granular)','Best for: device admin','  (router/switch SSH login)','','tacacs server MYTAC',' address ipv4 10.0.0.6',' key MySharedSecret'],'#8e44ad')+
      D.cb(20,340,600,50,'aaa new-model\naaa authentication login default group tacacs+ local\naaa authentication login default group radius local  ← "local" = fallback if server down')
  }],
  keys:[
    {l:'RADIUS',v:'UDP 1812/1813 · Password-only encrypted · Network access',t:'',
     why:'RADIUS (Remote Authentication Dial-In User Service) is the open standard (RFC 2865). It combines Authentication and Authorisation in a single Access-Accept/Reject response. Only the password field is MD5-encrypted — username and attributes are cleartext. Best for 802.1X, VPN, Wi-Fi.',
     cli:'radius server MY-RAD\n address ipv4 10.0.0.5 auth-port 1812 acct-port 1813\n key StrongSharedSecret\naaa group server radius RAD-GROUP\n server name MY-RAD\naaa authentication login VPN-AUTH group RAD-GROUP local',
     tip:'RADIUS accounting (UDP 1813) logs session start/stop — required for audit trails and billing.',tt:''},
    {l:'TACACS+',v:'TCP 49 · Entire packet encrypted · Device admin',t:'',
     why:'TACACS+ (Cisco proprietary) separates Authentication, Authorisation, and Accounting into independent exchanges — allowing granular control (e.g., allow "show" commands but deny "configure"). The ENTIRE packet body is encrypted, not just the password.',
     cli:'tacacs server MY-TAC\n address ipv4 10.0.0.6\n key StrongSharedSecret\naaa group server tacacs+ TAC-GROUP\n server name MY-TAC\naaa authentication login SSH-AUTH group TAC-GROUP local\nline vty 0 15\n login authentication SSH-AUTH',
     tip:'Use TACACS+ for device administration (SSH logins). Use RADIUS for network access (802.1X, VPN).',tt:'good'},
    {l:'aaa new-model',v:'Replaces ALL legacy line passwords — configure fallback FIRST',t:'bad',
     why:'When you type aaa new-model, ALL lines immediately require AAA authentication. If no method list is configured AND the server is unreachable, you are locked out. ALWAYS configure "aaa authentication login default local" as a minimum before enabling aaa new-model.',
     cli:'<span class="cli-comment">! SAFE order to enable AAA</span>\nusername admin privilege 15 secret Cisco123!\naaa new-model\naaa authentication login default group tacacs+ local\naaa authorization exec default group tacacs+ local if-authenticated\naaa accounting exec default start-stop group tacacs+',
     tip:'Never enable aaa new-model without a local fallback user. One typo = permanent lockout.',tt:'bad'},
    {l:'Privilege Levels',v:'0=minimal · 1=user EXEC · 15=full privileged EXEC',t:'',
     why:'IOS has 16 privilege levels (0-15). Level 1 = default after login (show commands only). Level 15 = full access. Levels 2-14 can be customised with specific command access. Set in username: "username admin privilege 15 secret pass".',
     cli:'<span class="cli-comment">! Assign privilege level to user</span>\nusername admin privilege 15 secret Cisco123!\nusername monitor privilege 5 secret View0nly!\n<span class="cli-comment">! Assign command to level 5</span>\nprivilege exec level 5 show interfaces\nprivilege exec level 5 show ip route',
     tip:'privilege exec level 1 show running-config — grants show run to level 1 users. Default is level 15 only.',tt:''},
    {l:'Fallback local',v:'"local" at end of method list = use local DB if server down',t:'warn',
     why:'If the AAA server is unreachable (power failure, network issue) AND there is no local fallback, the device becomes completely inaccessible. The "local" keyword at the end of the method list uses the local username database as a last resort.',
     cli:'<span class="cli-comment">! With fallback (correct)</span>\naaa authentication login default group tacacs+ local\n<span class="cli-comment">! Without fallback (dangerous!)</span>\naaa authentication login default group tacacs+\n<span class="cli-comment">! Server down = locked out!</span>',
     tip:'Test failover: disconnect AAA server, verify local login still works before leaving site.',tt:'warn'},
    {l:'Exam trap',v:'TACACS+ encrypts ENTIRE packet body. RADIUS encrypts PASSWORD only.',t:'bad',
     why:'This is the most tested AAA distinction. RADIUS MD5-encrypts only the password field — username, IP attributes, and all other AVPs are transmitted in cleartext. TACACS+ uses a shared secret to encrypt the entire body of every packet.',
     cli:'<span class="cli-comment">! Verify TACACS+ connectivity</span>\ntest aaa group tacacs+ admin Cisco123! legacy\n<span class="cli-comment">! Verify RADIUS connectivity</span>\ntest aaa group radius admin Cisco123! legacy\n<span class="cli-comment">! Check server stats</span>\nshow aaa servers',
     tip:'Output "User successfully authenticated" = server is reachable AND credentials valid.',tt:'bad'},
  ]
