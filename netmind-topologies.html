{ num:'21', title:'Wireless — Client Association & Security',
  desc:'Before a wireless client can pass data, it completes 3 steps: Probe/Scan → Authenticate → Associate. Security levels: WPA3 > WPA2-Enterprise (802.1X) > WPA2-Personal (PSK).',
  steps:[
  { label:'Step 1 — Association Process',
    html:`<b>Wireless medium access — CSMA/CA (Collision Avoidance):</b><br>
Wireless CANNOT detect collisions while transmitting (unlike Ethernet CSMA/CD) because the transmitter overwhelms its own receiver. Instead: ① Listen before transmit (carrier sense). ② If busy, wait a random backoff period. ③ Send RTS (Request to Send) → receive CTS (Clear to Send) → transmit → wait for ACK. Hidden node problem = two clients can't hear each other but both can reach AP → RTS/CTS solves it.<br><br>
<b>BSS vs ESS:</b><br>
BSS (Basic Service Set) = single AP + its associated clients. The AP uses its MAC as the BSSID.<br>
IBSS (Independent BSS) = ad-hoc mode, no AP, devices connect directly to each other.<br>
ESS (Extended Service Set) = multiple APs with the SAME SSID, allowing roaming. Client seamlessly reassociates when moving between APs.<br><br>
<b>Hidden SSID:</b> AP stops broadcasting SSID in beacons. Does NOT provide security — attacker can see SSID in probe requests from legitimate clients. Causes connection issues for legitimate users. Not worth doing.<br><br>
<b>Three-step process:</b> 1) Probe/Scan → 2) Authenticate → 3) Associate. Then DHCP → IP assigned.`,
    svg: () => D.defs()+
      D.pc('Laptop',80,250)+
      D.ap('AP-1',295,140,'#1a6fdb')+D.ap('AP-2',480,250,'#27ae60')+
      D.wave(295,145,'#8e44ad',0)+
      D.ln(144,248,265,150,'p')+D.pkt(144,248,265,150,'#8e44ad',0)+
      D.ln(265,152,144,250,'g')+
      `<text x="185" y="205" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8e44ad">Probe Req (all ch)</text>`+
      `<text x="185" y="240" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">Probe Resp (RSSI)</text>`+
      D.info(20,310,600,'Security Modes',['WPA3-Personal:     SAE (replaces PSK) — stronger, no PMKID attack','WPA2-Enterprise:  802.1X + EAP → RADIUS server → individual user credentials','WPA2-Personal:    Pre-Shared Key (PSK) — same key for all users','TKIP (WPA1):       Deprecated! AES-CCMP should always be used instead'],'#1a6fdb')
  }],
  keys:[
    {l:'3 steps',v:'Probe/Scan → Authenticate → Associate',t:''},
    {l:'WPA2-Enterprise',v:'802.1X + EAP. Individual credentials via RADIUS.',t:'good'},
    {l:'WPA2-Personal',v:'Shared PSK. All users same key — compromise = all compromised.',t:'warn'},
    {l:'2.4GHz channels',v:'Only 1, 6, 11 are non-overlapping in 2.4GHz. 5GHz has 24+.',t:'',why:'2.4GHz channels are 22MHz wide and spaced 5MHz apart — they overlap heavily. Only channels 1, 6, and 11 are truly non-overlapping. Neighbouring APs should use different non-overlapping channels to avoid interference. 5GHz has many non-overlapping channels (20/40/80/160MHz wide) — much better for dense deployments.',cli:'<span class="cli-comment">! 2.4GHz: use channels 1, 6, or 11 only</span>\n<span class="cli-comment">! Configure on WLC or autonomous AP:</span>\nAP(config)# <span class="cli-cmd">interface Dot11Radio0</span>\nAP(config-if)# <span class="cli-cmd">channel 1</span>\n<span class="cli-comment">! For 5GHz (802.11a/n/ac)</span>\nAP(config)# <span class="cli-cmd">interface Dot11Radio1</span>\nAP(config-if)# <span class="cli-cmd">channel 36</span>\n<span class="cli-comment">! Verify wireless stats</span>\nAP# <span class="cli-cmd">show dot11 associations</span>',tip:'Wi-Fi 6 (802.11ax) introduces OFDMA allowing multiple clients to share a single channel simultaneously — much better efficiency than older standards.',tt:'info'},
    {l:'AES-CCMP',v:'Correct WPA2 encryption. TKIP = deprecated WPA1.',t:''},

/* ═══════════════════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════════════════ */
let topicIdx = 0;
let stepIdx = 0;
let autoTimer = null;
const visited = new Set();

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  const sections = [
    {label:'Layer 2 / Switching', ids:[0,1,2,3,4,5,6]},
    {label:'Layer 3 / Routing', ids:[7,8,9,10,11]},
    {label:'IP Services', ids:[12,13,14,15,16]},
    {label:'Transport / Security', ids:[17,18,19,20]},
    {label:'Wireless', ids:[21,22]},
    {label:'Automation & IPv6', ids:[23,24,25]},
  ];
  let html = '';
  sections.forEach(sec => {
    html += `<div class="sb-section">${sec.label}</div>`;
    sec.ids.forEach(id => {
      const t = T[id];
      const active = id===topicIdx?'active':'';
      const vis = visited.has(id)&&id!==topicIdx?'visited':'';
      html += `<div class="sb-item ${active} ${vis}" id="si-${id}" onclick="goTopic(${id})">
        <span class="sb-num">${t.num}</span>
        <span class="sb-dot"></span>
        <span class="sb-name">${t.title}</span>
      </div>`;
    });
  });
  sb.innerHTML = html;
}

function renderTopic(){
  clearAuto();
  const t = T[topicIdx];
  // Track view in expertise system
  try{
    const sk='netmind_v2';
    const raw=localStorage.getItem(sk);
    const st=raw?JSON.parse(raw):{expertise:{},totalXP:0,streak:0,lastVisit:null,activity:[]};
    if(!st.expertise) st.expertise={};
    if(!st.expertise[t.num]) st.expertise[t.num]={views:0,quizScore:0,labsDone:0,scenariosDone:0,score:0};
    const e=st.expertise[t.num];
    if(e.views<5){
      e.views++;
      e.score=Math.min(e.views*4,20)+Math.min((e.quizScore||0),30)+Math.min((e.labsDone||0)*10,30)+Math.min((e.scenariosDone||0)*20,20);
      st.totalXP=(st.totalXP||0)+4;
      const today=new Date().toDateString();
      if(st.lastVisit!==today){const yest=new Date(Date.now()-86400000).toDateString();st.streak=st.lastVisit===yest?(st.streak||0)+1:1;st.lastVisit=today;}
      if(!st.activity) st.activity=[];
      st.activity.unshift({topicId:t.num,type:'view',label:'Viewed '+t.title,xp:4,time:Date.now()});
      st.activity=st.activity.slice(0,50);
      localStorage.setItem(sk,JSON.stringify(st));
    }
  }catch(err){}
  visited.add(topicIdx);
  document.getElementById('t-num').textContent = `TOPIC ${t.num} OF 26`;
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-desc').textContent = t.desc;
  // progress
  const pct = ((topicIdx+1)/T.length*100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `${topicIdx+1} / ${T.length}`;
  document.getElementById('nav-prog').textContent = `${topicIdx+1} of ${T.length} topics`;
  document.getElementById('nav-prev').disabled = topicIdx===0;
  document.getElementById('nav-next').textContent = topicIdx===T.length-1?'✓ Complete':'Next Topic →';
  // keys
  const kg = document.getElementById('keys-grid');
  kg.innerHTML = t.keys.map((k,i)=>{
    const hasDetail = !!(k.why||k.cli||k.tip);
    let di = '';
    if(k.why) di += '<div class="key-sec-head">Why it matters</div><div class="key-why">'+k.why+'</div>';
    if(k.cli) di += '<div class="key-sec-head">Configuration</div><div class="key-cli-block">'+k.cli.replace(/\n/g,'<br>')+'</div>';
    if(k.tip){
      const tt=k.tt||'info';
      const ic={warn:'⚠',bad:'✗',good:'✓',info:'ℹ'};
      di += '<div class="key-tip '+tt+'"><span class="key-tip-icon">'+(ic[tt]||'ℹ')+'</span><span>'+k.tip+'</span></div>';
    }
    const dd = hasDetail ? '<div class="key-detail"><div class="key-detail-inner">'+di+'</div></div>' : '';
    return '<div class="key-item '+k.t+'" onclick="toggleKey(this)" data-has="'+hasDetail+'">'+
      '<div class="key-front">'+
      '<div class="key-expand-icon">'+(hasDetail?'+':'')+'</div>'+
      '<div class="key-front-text">'+
      '<div class="key-label">'+k.l+'</div>'+
      '<div class="key-val">'+k.v+'</div>'+
      '</div></div>'+dd+'</div>';
  }).join('');

  renderStep();
  buildSidebar();
  document.getElementById('main').scrollTo(0,0);
}

function renderStep(){
  const t = T[topicIdx];
  const s = t.steps[stepIdx];
  // title
  document.getElementById('d-title').textContent = s.label;
  // SVG — replace entire element so browser properly restarts all SVG animations
  const svgContainer = document.querySelector('.d-svg');
  const oldSvg = document.getElementById('diagram-svg');
  if(oldSvg) oldSvg.remove();
  const newSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  newSvg.setAttribute('id','diagram-svg');
  newSvg.setAttribute('viewBox','0 0 640 410');
  newSvg.setAttribute('xmlns','http://www.w3.org/2000/svg');
  newSvg.setAttribute('style','width:100%;max-width:640px;');
  svgContainer.appendChild(newSvg);
  // Reset animation queue before calling svg() so D.pkt etc can register
  stopAnimLoop();
  _anims = [];
  newSvg.innerHTML = s.svg();
  
  // Start canvas animation loop on next frame (after SVG is painted)
  requestAnimationFrame(() => startAnimLoop());
  // callout
  document.getElementById('callout-step').textContent = s.label;
  document.getElementById('callout-text').innerHTML = s.html;
  // step info
  document.getElementById('step-info').textContent = `${stepIdx+1} / ${t.steps.length}`;
  // dots
  const dotsEl = document.getElementById('step-dots');
  dotsEl.innerHTML = t.steps.map((_, i) => {
    const cls = i===stepIdx?'active':i<stepIdx?'done':'';
    return `<div class="dot ${cls}" onclick="goStep(${i})"></div>`;
  }).join('');
  // buttons
  document.getElementById('btn-prev').disabled = stepIdx===0;
  document.getElementById('btn-next').disabled = stepIdx===t.steps.length-1;
}

function goStep(i){
  stepIdx = i;
  renderStep();
}
function nextStep(){
  if(stepIdx < T[topicIdx].steps.length-1){ stepIdx++; renderStep(); }
}
function prevStep(){
  if(stepIdx > 0){ stepIdx--; renderStep(); }
}
function goTopic(i){
  topicIdx = i; stepIdx = 0;
  renderTopic();
}
function nextTopic(){
  if(topicIdx < T.length-1){ topicIdx++; stepIdx=0; renderTopic(); }
}
function prevTopic(){
  if(topicIdx > 0){ topicIdx--; stepIdx=0; renderTopic(); }
}
function playAuto(){
  if(autoTimer){ clearAuto(); return; }
  document.getElementById('btn-play').textContent = '⏸ Pause';
  autoTimer = setInterval(()=>{
    const t = T[topicIdx];
    if(stepIdx < t.steps.length-1){ stepIdx++; renderStep(); }
    else { clearAuto(); }
  }, 3500);
}
function clearAuto(){
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  document.getElementById('btn-play').textContent = '▶ Auto';
}
function stopAnimLoop(){
  if(_animFrame){ cancelAnimationFrame(_animFrame); _animFrame=null; }
  if(_canvas){ _canvas.remove(); _canvas=null; _ctx=null; }
}


/* ═══════════════════════════════════════════════
   CANVAS ANIMATION ENGINE
   Draws moving packets on top of the SVG
═══════════════════════════════════════════════ */
let _canvas = null;
let _ctx = null;
let _startTime = 0;

function ensureCanvas(){
  // Always use the SVG element itself as the container reference
  const svg = document.getElementById('diagram-svg');
  if(!svg) return;
  const svgRect = svg.getBoundingClientRect();
  const containerRect = svg.parentElement.getBoundingClientRect();

  if(!_canvas){
    _canvas = document.createElement('canvas');
    _canvas.style.cssText = 'position:absolute;pointer-events:none;z-index:10;';
    svg.parentElement.style.position = 'relative';
    svg.parentElement.appendChild(_canvas);
  }

  // Position canvas exactly over the SVG
  const offLeft = svgRect.left - containerRect.left;
  const offTop  = svgRect.top  - containerRect.top;

  _canvas.width  = svgRect.width;
  _canvas.height = svgRect.height;
  _canvas.style.width  = svgRect.width  + 'px';
  _canvas.style.height = svgRect.height + 'px';
  _canvas.style.left   = offLeft + 'px';
  _canvas.style.top    = offTop  + 'px';

  _ctx = _canvas.getContext('2d');
  // Scale canvas coords to match SVG viewBox (640 x 410)
  _ctx.setTransform(svgRect.width / 640, 0, 0, svgRect.height / 410, 0, 0);
}

function startAnimLoop(){
  if(_animFrame) cancelAnimationFrame(_animFrame);
  if(_anims.length === 0) return;
  _startTime = performance.now();

  function loop(ts){
    // Re-sync canvas position every frame (handles resize/scroll)
    ensureCanvas();
    if(!_ctx){ _animFrame = requestAnimationFrame(loop); return; }

    _ctx.clearRect(0, 0, 640, 410);
    const elapsed = (ts - _startTime) / 1000;

    _anims.forEach(a => {
      const localT = elapsed - a.delay;
      if(localT < 0) return;
      const t = (localT % a.dur) / a.dur;
      if(a.type === 'pkt')  drawPkt(a, t);
      else if(a.type === 'wave') drawWave(a, elapsed);
      else if(a.type === 'bpdu') drawBpdu(a, t);
    });

    _animFrame = requestAnimationFrame(loop);
  }
  _animFrame = requestAnimationFrame(loop);
}

function drawPkt(a, t){
  // Ease in-out opacity
  let opacity;
  if(t < 0.05) opacity = t/0.05;
  else if(t > 0.88) opacity = (1-t)/0.12;
  else opacity = 1;
  
  const x = a.x1 + (a.x2 - a.x1) * t;
  const y = a.y1 + (a.y2 - a.y1) * t;
  
  _ctx.save();
  _ctx.globalAlpha = opacity;
  
  // Glow
  _ctx.shadowColor = a.fill;
  _ctx.shadowBlur = 12;
  
  // Circle
  _ctx.beginPath();
  _ctx.arc(x, y, 9, 0, Math.PI*2);
  _ctx.fillStyle = a.fill;
  _ctx.fill();
  _ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  _ctx.lineWidth = 1.5;
  _ctx.stroke();
  
  _ctx.restore();
}

function drawWave(a, elapsed){
  const localT = elapsed - a.delay;
  if(localT < 0) return;
  
  // Two overlapping expanding rings
  [0, 0.8].forEach(offset => {
    const t = ((localT - offset) % a.dur) / a.dur;
    if(t < 0) return;
    const r = 10 + t * 70;
    const opacity = (1 - t) * 0.8;
    _ctx.save();
    _ctx.globalAlpha = opacity;
    _ctx.beginPath();
    _ctx.arc(a.cx, a.cy, r, 0, Math.PI*2);
    _ctx.strokeStyle = a.col;
    _ctx.lineWidth = 3;
    _ctx.stroke();
    _ctx.restore();
  });
  
  // Solid centre dot
  _ctx.beginPath();
  _ctx.arc(a.cx, a.cy, 8, 0, Math.PI*2);
  _ctx.fillStyle = a.col;
  _ctx.globalAlpha = 0.9;
  _ctx.fill();
  _ctx.globalAlpha = 1;
}

function drawBpdu(a, t){
  let opacity;
  if(t < 0.05) opacity = t/0.05;
  else if(t > 0.85) opacity = (1-t)/0.15;
  else opacity = 1;
  
  const x = a.x1 + (a.x2 - a.x1) * t;
  const y = a.y1 + (a.y2 - a.y1) * t;
  
  _ctx.save();
  _ctx.globalAlpha = opacity;
  _ctx.shadowColor = a.col;
  _ctx.shadowBlur = 8;
  
  // Rounded rect
  const w=44, h=22, r=5;
  const rx = x - w/2, ry = y - h/2;
  _ctx.beginPath();
  _ctx.moveTo(rx+r, ry);
  _ctx.lineTo(rx+w-r, ry);
  _ctx.arcTo(rx+w,ry, rx+w,ry+r, r);
  _ctx.lineTo(rx+w, ry+h-r);
  _ctx.arcTo(rx+w,ry+h, rx+w-r,ry+h, r);
  _ctx.lineTo(rx+r, ry+h);
  _ctx.arcTo(rx,ry+h, rx,ry+h-r, r);
  _ctx.lineTo(rx, ry+r);
  _ctx.arcTo(rx,ry, rx+r,ry, r);
  _ctx.closePath();
  _ctx.fillStyle = a.col;
  _ctx.fill();
  _ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  _ctx.lineWidth = 1;
  _ctx.stroke();
  
  // Label
  _ctx.shadowBlur = 0;
  _ctx.fillStyle = '#fff';
  _ctx.font = 'bold 9px JetBrains Mono, monospace';
  _ctx.textAlign = 'center';
  _ctx.textBaseline = 'middle';
  _ctx.fillText(a.lbl, x, y);
  
  _ctx.restore();
}


function toggleKey(el){
  if(!el.dataset.has || el.dataset.has==='false') return;
  const wasOpen = el.classList.contains('open');
  // Close all open cards in the same grid
  document.querySelectorAll('.key-item.open').forEach(e=>e.classList.remove('open'));
  if(!wasOpen) el.classList.add('open');
}

// Keyboard nav
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') nextStep();
  else if(e.key==='ArrowLeft') prevStep();
  else if(e.key==='ArrowDown') nextTopic();
  else if(e.key==='ArrowUp') prevTopic();
});

try {
  renderTopic();
} catch(e) {
  console.error('renderTopic failed:', e);
  document.getElementById('t-title').textContent = 'Error: ' + e.message;
}

</script>
