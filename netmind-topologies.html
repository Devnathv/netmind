<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NetMind · Animated Topologies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Font fallbacks when loaded locally */
/* fonts loaded via <link> in <head> */

/* Packet animations via CSS for cross-browser support */
@keyframes moveRight {
  0%   { transform: translateX(-40px); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateX(40px); opacity: 0; }
}
@keyframes pulseFade {
  0%, 100% { opacity: 0; }
  15%, 80%  { opacity: 1; }
}
@keyframes expandRing {
  0%   { r: 8; opacity: 0.8; }
  100% { r: 75; opacity: 0; }
}
</style>
<style>
:root{
  --bg:#f0f2f7;--white:#fff;--dark:#0a0c14;
  --blue:#1a6fdb;--teal:#00e8c8;--red:#e03e3e;
  --amber:#f39c12;--green:#27ae60;--purple:#8e44ad;
  --gray:#8892a4;--light:#e8ecf4;--border:#d0d8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);height:100vh;overflow:hidden;}

#topbar{background:var(--dark);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;position:relative;z-index:100;}
.brand{font-family:'Syne',sans-serif;font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.brand b{color:#00e8c8;}
.back-btn{height:28px;padding:0 14px;border-radius:6px;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,.4);}
.progress-bar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-left:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .4s ease;width:3.8%;}
.progress-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);}

#shell{display:flex;height:calc(100vh - 52px);}

/* SIDEBAR */
#sidebar{width:248px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding-bottom:20px;}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sb-section{padding:10px 14px 4px;font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gray);border-top:1px solid var(--light);margin-top:6px;}
.sb-section:first-child{border-top:none;margin-top:0;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .12s;border-left:3px solid transparent;}
.sb-item:hover{background:var(--light);}
.sb-item.active{background:#e8f4ff;border-left-color:var(--blue);}
.sb-num{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--gray);width:16px;flex-shrink:0;}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s;}
.sb-item.active .sb-dot{background:var(--blue);}
.sb-item.visited .sb-dot{background:var(--green);}
.sb-name{font-size:11px;font-weight:600;color:var(--gray);line-height:1.3;}
.sb-item.active .sb-name{color:var(--dark);}

/* MAIN */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);}
#main::-webkit-scrollbar{width:5px;}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TOPIC HEADER */
.t-header{padding:22px 28px 0;}
.t-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.t-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:900;color:var(--dark);margin-bottom:6px;line-height:1.1;}
.t-desc{font-size:12px;color:var(--gray);line-height:1.7;max-width:680px;margin-bottom:16px;}

/* DIAGRAM CARD */
.d-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin:0 28px 16px;box-shadow:0 2px 16px rgba(0,0,0,.06);}
.d-card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--light);background:#fafbfd;}
.d-card-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);}
.d-controls{display:flex;gap:7px;align-items:center;}
.step-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gray);}
.btn{height:28px;padding:0 13px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--dark);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary:hover{background:#1258c0;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn:disabled:hover{background:var(--white);color:var(--dark);border-color:var(--border);}

.d-svg{padding:18px 22px 12px;display:flex;justify-content:center;min-height:420px;align-items:center;}
.d-svg svg{width:100%;max-width:640px;}

/* STEP DOTS */
.step-dots{display:flex;gap:5px;justify-content:center;padding:6px 0 14px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.dot.active{background:var(--blue);transform:scale(1.4);}
.dot.done{background:var(--green);}

/* CALLOUT */
.callout{margin:0 22px 14px;background:#f0f6ff;border:1px solid #c8dcf5;border-radius:10px;padding:12px 16px;}
.callout-step{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:4px;}
.callout-text{font-size:12px;color:var(--dark);line-height:1.65;}
.callout-text b{color:var(--blue);}
.callout-text code{font-family:'JetBrains Mono',monospace;background:var(--light);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--blue);}

/* KEY POINTS */
.keys-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 28px 20px;}

/* ── Interactive Key Cards ── */
.key-item{
  background:var(--white);border:1px solid var(--border);border-radius:10px;
  border-left:3px solid var(--blue);cursor:pointer;
  transition:box-shadow .18s,border-color .18s;overflow:hidden;
}
.key-item[data-has="false"]{cursor:default;}
.key-item[data-has="true"]:hover{box-shadow:0 4px 20px rgba(26,111,219,.14);border-color:var(--blue);}
.key-item.warn[data-has="true"]:hover{box-shadow:0 4px 20px rgba(243,156,18,.14);border-color:var(--amber);}
.key-item.good[data-has="true"]:hover{box-shadow:0 4px 20px rgba(39,174,96,.14);border-color:var(--green);}
.key-item.bad[data-has="true"]:hover{box-shadow:0 4px 20px rgba(224,62,62,.14);border-color:var(--red);}
.key-item.warn{border-left-color:var(--amber);}
.key-item.good{border-left-color:var(--green);}
.key-item.bad{border-left-color:var(--red);}

.key-front{padding:11px 13px 10px;display:flex;align-items:flex-start;gap:8px;}
.key-expand-icon{
  width:18px;height:18px;border-radius:50%;background:var(--light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  font-size:10px;color:var(--gray);transition:all .2s;font-weight:700;line-height:1;
}
.key-item.open .key-expand-icon{background:var(--blue);color:#fff;transform:rotate(45deg);}
.key-item.warn.open .key-expand-icon{background:var(--amber);}
.key-item.good.open .key-expand-icon{background:var(--green);}
.key-item.bad.open .key-expand-icon{background:var(--red);}
.key-front-text{flex:1;min-width:0;}
.key-label{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-bottom:3px;}
.key-val{font-size:11px;color:var(--dark);line-height:1.5;}
.key-val code{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--light);padding:1px 5px;border-radius:3px;color:var(--blue);}

/* Expandable panel */
.key-detail{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.key-item.open .key-detail{max-height:700px;}
.key-detail-inner{padding:0 14px 14px;border-top:1px solid var(--light);padding-top:12px;}

/* Why section */
.key-why{font-size:11px;color:#333;line-height:1.7;margin-bottom:10px;}
.key-why b{color:var(--dark);}

/* CLI block - terminal look */
.key-cli-block{
  background:#0d1117;border-radius:8px;padding:12px 14px;margin-bottom:8px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:#c9d1d9;
  line-height:1.8;overflow-x:auto;border:1px solid #30363d;
}
.key-cli-block .cli-prompt{color:#56d364;user-select:none;}
.key-cli-block .cli-comment{color:#8b949e;font-style:italic;}
.key-cli-block .cli-cmd{color:#79c0ff;}
.key-cli-block .cli-val{color:#ffa657;}
.key-cli-block .cli-ok{color:#56d364;font-weight:700;}
.key-cli-block .cli-warn{color:#f0c040;}
.key-cli-block .cli-key{color:#ff7b72;}

/* Tip badge */
.key-tip{
  padding:8px 10px;border-radius:7px;font-size:10.5px;line-height:1.55;
  display:flex;align-items:flex-start;gap:7px;
}
.key-tip-icon{font-size:13px;flex-shrink:0;margin-top:0px;}
.key-tip.warn{background:#fffbeb;color:#713f12;border:1px solid #fde68a;}
.key-tip.bad{background:#fef2f2;color:#7f1d1d;border:1px solid #fecaca;}
.key-tip.good{background:#f0fdf4;color:#14532d;border:1px solid #86efac;}
.key-tip.info{background:#eff6ff;color:#1e3a5f;border:1px solid #bfdbfe;}

/* Section headers inside detail */
.key-sec-head{
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gray);margin-bottom:5px;margin-top:10px;
}
.key-sec-head:first-child{margin-top:0;}


/* NAV FOOTER */
.nav-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 28px 20px;margin-top:auto;}
.nav-btn{height:34px;padding:0 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn.next{background:var(--blue);color:#fff;border-color:var(--blue);}
.nav-btn.next:hover{background:#1258c0;}
.nav-progress{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gray);}

/* Packet animations via CSS for cross-browser support */
@keyframes moveRight {
  0%   { transform: translateX(-40px); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateX(40px); opacity: 0; }
}
@keyframes pulseFade {
  0%, 100% { opacity: 0; }
  15%, 80%  { opacity: 1; }
}
@keyframes expandRing {
  0%   { r: 8; opacity: 0.8; }
  100% { r: 75; opacity: 0; }
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">Net<b>Mind</b> · Topologies</div>
  <button class="back-btn" onclick="window.location='netmind-hub.html'">⬅ Dashboard</button>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="progress-label" id="prog-label">1 / 26</div>
</div>

<div id="shell">

<div id="sidebar"></div>

<div id="main">
  <div class="t-header">
    <div class="t-num" id="t-num"></div>
    <div class="t-title" id="t-title"></div>
    <div class="t-desc" id="t-desc"></div>
  </div>

  <div class="d-card">
    <div class="d-card-head">
      <div class="d-card-title" id="d-title">TOPOLOGY DIAGRAM</div>
      <div class="d-controls">
        <span class="step-info" id="step-info"></span>
        <button class="btn" id="btn-prev" onclick="prevStep()">← Prev</button>
        <button class="btn primary" id="btn-play" onclick="playAuto()">▶ Auto</button>
        <button class="btn" id="btn-next" onclick="nextStep()">Next →</button>
      </div>
    </div>
    <div class="d-svg">
      <svg id="diagram-svg" viewBox="0 0 640 410" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="step-dots" id="step-dots"></div>
    <div class="callout" id="callout">
      <div class="callout-step" id="callout-step"></div>
      <div class="callout-text" id="callout-text"></div>
    </div>
  </div>

  <div class="keys-grid" id="keys-grid"></div>

  <div class="nav-footer">
    <button class="nav-btn" id="nav-prev" onclick="prevTopic()">← Previous Topic</button>
    <div class="nav-progress" id="nav-prog"></div>
    <div style="display:flex;gap:8px">
      <button class="nav-btn" id="btn-scenario" onclick="openScenario()" title="Try a real-world scenario for this topic">🎯 Scenario</button>
      <button class="nav-btn" id="btn-quiz" onclick="startQuiz()" title="Test yourself on this topic">✅ Quiz</button>
      <button class="nav-btn" id="btn-lab" onclick="openLab()" title="Practice in the IOS lab">💻 Lab</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="nav-btn" onclick="window.open('netmind-scenarios.html?topic='+T[topicIdx].num,'_blank')" style="border-color:rgba(243,156,18,.4);color:#f39c12;">⚡ Scenario</button>
      <button class="nav-btn next" id="nav-next" onclick="nextTopic()">Next Topic →</button>
    </div>
  </div>
</div>


<!-- QUIZ MODAL -->
<div id="quiz-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#161b2e;border:1px solid #1e2640;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease">
    <div style="padding:24px;border-bottom:1px solid #1e2640;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div id="quiz-topic-label" style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00e8c8;margin-bottom:4px"></div>
        <div id="quiz-title" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f0f4ff">Quick Quiz</div>
      </div>
      <div id="quiz-q-counter" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#8892a4"></div>
    </div>
    <div id="quiz-body" style="padding:24px"></div>
  </div>
</div>

</div><!-- shell -->

<script>
window.onerror = function(msg, src, line, col, err) {
  console.error('JS Error:', msg, 'at', src, line+':'+col);
  const el = document.getElementById('t-title');
  if(el) el.textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
  return false;
};

/* ═══════════════════════════════════════════════════════
   SVG HELPERS — Cisco-style drawing primitives
═══════════════════════════════════════════════════════ */
const D = {};
let _anims = []; // animation queue
let _animFrame = null;

D.defs = () => `<defs>
  <marker id="aB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1a6fdb"/></marker>
  <marker id="aG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/></marker>
  <marker id="aA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f39c12"/></marker>
  <marker id="aR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e03e3e"/></marker>
  <marker id="aP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8e44ad"/></marker>
</defs>`;

// Switch box
D.sw = (label, cx, cy, col='#1a6fdb', sub='') => {
  const w=72,h=38,x=cx-36,y=cy-19;
  const ty = sub ? cy-2 : cy+4;
  const subEl = sub ? `<text x="${cx}" y="${cy+9}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="${col}99">${sub}</text>` : '';
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="${col}18" stroke="${col}" stroke-width="1.5"/>
  <text x="${cx}" y="${ty}" text-anchor="middle" font-family="Syne" font-size="11" font-weight="800" fill="${col}">${label}</text>
  ${subEl}`;
};

// Router circle
D.rt = (label, cx, cy, col='#f39c12', sub='') => {
  const ty = sub ? cy-3 : cy+4;
  const subEl = sub ? `<text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="${col}99">${sub}</text>` : '';
  return `<circle cx="${cx}" cy="${cy}" r="27" fill="${col}14" stroke="${col}" stroke-width="1.5"/>
  <text x="${cx}" y="${ty}" text-anchor="middle" font-family="Syne" font-size="10" font-weight="800" fill="${col}">${label}</text>
  ${subEl}`;
};

// PC box
D.pc = (label, cx, cy, col='#27ae60', sub='') => {
  const w=64,h=38,x=cx-32,y=cy-19;
  const ty = sub ? cy-3 : cy+4;
  const subEl = sub ? `<text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="${col}99">${sub}</text>` : '';
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="${col}10" stroke="${col}" stroke-width="1.2"/>
  <text x="${cx}" y="${ty}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${col}">${label}</text>
  ${subEl}`;
};

// Server
D.srv = (label, cx, cy, col='#1a6fdb') => {
  const w=64,h=46,x=cx-32,y=cy-23;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${col}14" stroke="${col}" stroke-width="1.5"/>
  <rect x="${x+4}" y="${y+4}" width="${w-8}" height="8" rx="2" fill="${col}30"/>
  <rect x="${x+4}" y="${y+16}" width="${w-8}" height="8" rx="2" fill="${col}20"/>
  <text x="${cx}" y="${cy+20}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${col}">${label}</text>`;
};

// AP (access point)
D.ap = (label, cx, cy, col='#8e44ad') => {
  return `<rect x="${cx-30}" y="${cy-10}" width="60" height="20" rx="10" fill="${col}18" stroke="${col}" stroke-width="1.5"/>
  <text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${col}">${label}</text>`;
};

// Line / link
D.ln = (x1,y1,x2,y2,type='') => {
  const t = type;
  let col='#c8d4e8', me='', dash='';
  if(t.includes('b')){col='#1a6fdb';me='url(#aB)';}
  else if(t.includes('g')){col='#27ae60';me='url(#aG)';}
  else if(t.includes('a')){col='#f39c12';me='url(#aA)';}
  else if(t.includes('r')){col='#e03e3e';me='url(#aR)';dash='stroke-dasharray="6,3"';}
  else if(t.includes('p')){col='#8e44ad';me='url(#aP)';}
  if(t.includes('-')) dash='stroke-dasharray="5,3"';
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="1.8" ${dash} marker-end="${me}"/>`;
};

// Curved link
D.curve = (x1,y1,x2,y2,cx,cy,type='b') => {
  const cols={b:'#1a6fdb',g:'#27ae60',a:'#f39c12',r:'#e03e3e',p:'#8e44ad'};
  const ids={b:'aB',g:'aG',a:'aA',r:'aR',p:'aP'};
  return `<path d="M${x1},${y1} Q${cx},${cy} ${x2},${y2}" stroke="${cols[type]||'#ccc'}" stroke-width="1.8" fill="none" marker-end="url(#${ids[type]||'aB'})"/>`;
};

// Port label
D.pl = (x,y,txt) => `<text x="${x}" y="${y}" font-family="JetBrains Mono" font-size="8" fill="#8892a4">${txt}</text>`;

// Callout box (yellow sticky note style)
D.cb = (x,y,w,h,txt) => {
  const lines = txt.split('\n');
  const lineH = 13;
  const texts = lines.map((l,i) => `<text x="${x+w/2}" y="${y+h/2+(i-(lines.length-1)/2)*lineH}" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#333">${l}</text>`).join('');
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="#fffde7" stroke="#fbc02d" stroke-width="1"/>${texts}`;
};

// Info box
D.info = (x,y,w,title,lns,col) => {
  col = col||'#1a6fdb';
  const h = 28 + lns.length*14;
  let rows = '';
  for(let i=0;i<lns.length;i++){
    rows += '<text x="'+(x+10)+'" y="'+(y+26+i*14)+'" font-family="JetBrains Mono" font-size="8" fill="#333">'+lns[i]+'</text>';
  }
  return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="8" fill="'+col+'0e" stroke="'+col+'" stroke-width="1.2"/>'+
    '<text x="'+(x+w/2)+'" y="'+(y+16)+'" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="'+col+'">'+title+'</text>'+rows;
};

// Animated moving packet
D.pkt = (a,b,c,d,e,f,g) => {
  // Registers an animated packet — returns empty string (animation handled by JS loop)
  let x1,y1,x2,y2,fill,delay,dur;
  if(typeof e === 'string'){
    [x1,y1,x2,y2,fill,delay,dur]=[a,b,c,d,e,f,g||1.8];
  } else {
    const cx=a,cy=b; fill=c; delay=d; const dx=e||80; dur=1.8;
    x1=cx-dx/2; y1=cy; x2=cx+dx/2; y2=cy;
  }
  _anims.push({type:'pkt',x1,y1,x2,y2,fill,delay,dur,t:0});
  return '';
};

// Packet traveling along path
D.pktPath = (path, fill, delay, dur=2) => {
  return `<circle r="6" fill="${fill}"><animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite"><mpath href="#${path}"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/></circle>`;
};

// BPDU/control packet
D.bpdu = (a,b,c,d,e,f,g) => {
  let x1,y1,x2,y2,delay,lbl,col;
  if(typeof c === 'number' && typeof d === 'string'){
    x1=a-30;y1=b;x2=a+30;y2=b; delay=c; lbl=d; col=e||'#8e44ad';
  } else {
    [x1,y1,x2,y2,delay,lbl,col]=[a,b,c,d,e,f,g||'#8e44ad'];
  }
  _anims.push({type:'bpdu',x1,y1,x2,y2,delay,lbl,col,dur:2,t:0});
  return '';
};

// X (blocked)
D.X = (cx,cy,s=10) => `<line x1="${cx-s}" y1="${cy-s}" x2="${cx+s}" y2="${cy+s}" stroke="#e03e3e" stroke-width="3"/><line x1="${cx+s}" y1="${cy-s}" x2="${cx-s}" y2="${cy+s}" stroke="#e03e3e" stroke-width="3"/>`;

// Crown
D.crown = (cx,cy) => `<text x="${cx}" y="${cy}" text-anchor="middle" font-size="18">👑</text>`;

// VLAN tag on frame
D.tag = (x,y,vlan,col) => `<rect x="${x}" y="${y}" width="30" height="16" rx="3" fill="${col}" opacity="0.9"/><text x="${x+15}" y="${y+11}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#fff" font-weight="700">${vlan}</text>`;

// Broadcast wave animation
D.wave = (cx,cy,col,delay) => {
  _anims.push({type:'wave',cx,cy,col,delay,dur:2.2,t:0});
  return '';
};
  

// Frame field box  
D.field = (x,y,w,h,label,line2,fillCol,strokeCol) => {
  const line2El = line2 ? `<text x="${x+w/2}" y="${y+h/2+9}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="${strokeCol}99">${line2}</text>` : '';
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${fillCol}" stroke="${strokeCol}" stroke-width="1"/>
<text x="${x+w/2}" y="${y+h/2-3}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${strokeCol}">${label}</text>
${line2El}`;
};

// State badge
D.badge = (x,y,txt,col) => `<rect x="${x}" y="${y}" width="${txt.length*7+10}" height="18" rx="9" fill="${col}22" stroke="${col}" stroke-width="1"/>
<text x="${x+(txt.length*7+10)/2}" y="${y+13}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="${col}">${txt}</text>`;

  { label:'Step 3 — VLAN Database & Access Port Config',
    html:`<b>Critical config order:</b> 1) Create VLAN in database. 2) Name it. 3) Assign ports. If you skip step 1, the port assignment may fail silently on older IOS. Use <code>show vlan brief</code> to verify — port must show in the correct VLAN column, not in VLAN 1.`,

/* ── 2 Trunking ── */
{ num:'03', title:'802.1Q VLAN Trunking',
  desc:'A trunk link carries frames from multiple VLANs on one physical cable. 802.1Q inserts a 4-byte tag after the Source MAC to identify which VLAN each frame belongs to. The native VLAN travels untagged — a misconfigured native VLAN enables VLAN hopping attacks.',
  steps:[
  { label:'Step 1 — Why Trunks? Multi-Switch VLAN Spans',
    html:`<b>Problem without trunking:</b> If VLAN 10 exists on both SW1 and SW2, you need one physical link per VLAN between switches — completely unscalable. A trunk solves this by multiplexing all VLANs onto a single link using 802.1Q tags.`,
    svg: () => D.defs()+
      D.sw('SW1',180,200,'#e03e3e')+D.sw('SW2',460,200,'#e03e3e')+
      // 3 separate links labelled
      D.ln(218,185,422,185,'r')+`<text x="320" y="178" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">Link for VLAN 10 only (wasteful)</text>`+
      D.ln(218,200,422,200,'r')+`<text x="320" y="195" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">Link for VLAN 20 only (wasteful)</text>`+
      D.ln(218,215,422,215,'r')+`<text x="320" y="223" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">Link for VLAN 30 only (wasteful)</text>`+
      `<text x="320" y="280" text-anchor="middle" font-family="Syne" font-size="12" font-weight="700" fill="#e03e3e">Without trunk: 1 link per VLAN</text>`+
      D.sw('SW1b',180,360,'#27ae60')+D.sw('SW2b',460,360,'#27ae60')+
      D.ln(218,360,422,360,'g')+
      D.tag(260,350,'V10','#1a6fdb')+D.tag(296,350,'V20','#27ae60')+D.tag(332,350,'V30','#8e44ad')+
      `<text x="320" y="400" text-anchor="middle" font-family="Syne" font-size="12" font-weight="700" fill="#27ae60">With trunk: all VLANs on ONE link</text>`
  },
  { label:'Step 2 — 802.1Q Tag Structure',
    html:`<b>The 4-byte 802.1Q tag</b> is inserted between Source MAC and EtherType. TPID (0x8100) tells the switch it is an 802.1Q frame. The 12-bit VLAN ID supports VLANs 0–4095 (0 and 4095 reserved). PCP = Priority Code Point (used for QoS). The receiving switch reads the tag, strips it, and delivers the untagged frame to the correct VLAN.`,
    svg: () => D.defs()+
      // Ethernet frame before tagging
      `<text x="320" y="50" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#555">STANDARD ETHERNET FRAME (untagged)</text>`+
      D.field(30,60,95,45,'DST MAC','6 bytes','#e8f0fe','#1a6fdb')+
      D.field(128,60,95,45,'SRC MAC','6 bytes','#e8f0fe','#1a6fdb')+
      D.field(226,60,80,45,'EtherType','2 bytes','#e8f0fe','#1a6fdb')+
      D.field(309,60,230,45,'PAYLOAD','46–1500 bytes','#f0f9f4','#27ae60')+
      D.field(542,60,58,45,'FCS','4 bytes','#e8f0fe','#1a6fdb')+
      // 802.1Q tagged frame
      `<text x="320" y="145" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#f39c12">802.1Q TAGGED FRAME (on trunk)</text>`+
      D.field(30,155,80,45,'DST MAC','6 bytes','#e8f0fe','#1a6fdb')+
      D.field(113,155,80,45,'SRC MAC','6 bytes','#e8f0fe','#1a6fdb')+
      `<rect x="196" y="155" width="100" height="45" rx="4" fill="#fff3e0" stroke="#f39c12" stroke-width="2"/>
       <text x="246" y="174" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#f39c12">802.1Q TAG</text>
       <text x="246" y="187" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#555">0x8100 · PCP · VLAN</text>
       <text x="246" y="197" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#f39c12">4 bytes inserted</text>`+
      D.field(299,155,60,45,'EtherType','2 bytes','#e8f0fe','#1a6fdb')+
      D.field(362,155,175,45,'PAYLOAD','46–1500 bytes','#f0f9f4','#27ae60')+
      D.field(540,155,60,45,'FCS','4 bytes','#e8f0fe','#1a6fdb')+
      // Tag detail
      `<rect x="30" y="240" width="580" height="110" rx="8" fill="#fff3e022" stroke="#f39c12" stroke-width="1.5"/>
       <text x="320" y="260" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#f39c12">802.1Q Tag Field Breakdown</text>
       <text x="50" y="280" font-family="JetBrains Mono" font-size="9" fill="#555">Bits 16-31:  TPID = 0x8100  (Tag Protocol ID — identifies 802.1Q)</text>
       <text x="50" y="296" font-family="JetBrains Mono" font-size="9" fill="#555">Bits 15-13:  PCP  = 0–7     (Priority Code Point — QoS marking)</text>
       <text x="50" y="312" font-family="JetBrains Mono" font-size="9" fill="#555">Bit  12:     DEI  = 0/1     (Drop Eligible Indicator)</text>
       <text x="50" y="328" font-family="JetBrains Mono" font-size="9" fill="#1a6fdb" font-weight="700">Bits 11-0:   VID  = 0–4095  (VLAN ID — 12 bits = 4096 possible VLANs)</text>
       <text x="50" y="344" font-family="JetBrains Mono" font-size="9" fill="#8892a4">Native VLAN = no tag added · Max frame size grows from 1518 → 1522 bytes</text>`
  },
  { label:'Step 3 — Native VLAN Mismatch = Security Risk',
    html:`<b>DTP negotiation matrix (memorise):</b> Auto+Auto=Access · Auto+Desirable=Trunk · Desirable+Desirable=Trunk · Trunk+Auto=Trunk · Access+Access=Access · Access+Trunk=Mismatch.<br><b>Disable DTP:</b> <code>switchport nonegotiate</code> on ALL trunk ports — prevents VLAN hopping via DTP negotiation.<br><b>Verify mode:</b> <code>show interfaces trunk</code> — Mode column should show "on" (static), not "desirable" or "auto".<br><br><b>show interfaces trunk columns:</b> Mode (on/desirable/auto) · Encapsulation (802.1q) · Status (trunking/not-trunking) · Native VLAN.<br>Active VLANs = allowed AND up on local switch AND VLANs that exist in the VLAN DB.<br><br><b>Native VLAN mismatch:</b> SW1 native=VLAN 1, SW2 native=VLAN 10. Untagged VLAN 1 frames received as VLAN 10 — VLAN hopping. Traffic crosses VLAN boundaries without a router — this is a <b>VLAN hopping attack</b>. Fix: set both ends to the same unused VLAN (e.g. 999).`,
    svg: () => D.defs()+
      D.sw('SW1',155,145,'#e03e3e','native=VLAN 1')+D.sw('SW2',485,145,'#e03e3e','native=VLAN 10')+
      D.ln(192,148,448,148,'b')+
      `<text x="320" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#8892a4">Untagged VLAN 1 frame →</text>`+
      D.X(320,148)+
      `<text x="320" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#e03e3e">← SW2 receives as VLAN 10! VLAN HOPPING!</text>`+
      `<rect x="40" y="195" width="250" height="80" rx="8" fill="#fef2f2" stroke="#e03e3e" stroke-width="1.5"/>
       <text x="165" y="215" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#e03e3e">ATTACK VECTOR</text>
       <text x="55" y="233" font-family="DM Sans" font-size="9" fill="#555">1. Attacker in VLAN 1 on SW1</text>
       <text x="55" y="249" font-family="DM Sans" font-size="9" fill="#555">2. Sends untagged frames</text>
       <text x="55" y="265" font-family="DM Sans" font-size="9" fill="#e03e3e">3. Reaches VLAN 10 on SW2!</text>`+
      `<rect x="330" y="195" width="270" height="80" rx="8" fill="#f0f9f422" stroke="#27ae60" stroke-width="1.5"/>
       <text x="465" y="215" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#27ae60">FIX — BOTH SWITCHES</text>
       <text x="345" y="233" font-family="JetBrains Mono" font-size="9" fill="#333">switchport trunk native vlan 999</text>
       <text x="345" y="249" font-family="JetBrains Mono" font-size="9" fill="#333">vlan 999</text>
       <text x="345" y="265" font-family="JetBrains Mono" font-size="9" fill="#333"> name UNUSED_NATIVE</text>`+
      D.sw('SW1b',155,320,'#27ae60','native=999')+D.sw('SW2b',485,320,'#27ae60','native=999')+
      D.ln(192,320,448,320,'g')+
      D.tag(260,310,'V10','#1a6fdb')+D.tag(296,310,'V20','#27ae60')+D.tag(332,310,'V30','#8e44ad')+
      D.pkt(192,320,448,320,'#27ae60',0)+
      D.cb(120,388,400,22,'✓ Both native=999 · Unmatched native VLAN generates CDP/syslog warnings')
  }],
  keys:[
    {l:'Native VLAN',v:'Untagged on trunk — both ends MUST match, use VLAN 999',why:'Native VLAN mismatch = VLAN hopping. SW1 native=1 sends VLAN 1 untagged; SW2 native=10 receives it as VLAN 10. Traffic crosses VLAN boundaries without a router.',cli:'interface G0/24\n switchport trunk native vlan 999\nvlan 999\n name UNUSED_NATIVE\nshow interfaces G0/24 trunk',tip:'CDP warns: "%CDP-4-NATIVE_VLAN_MISMATCH" if native VLANs differ.',tt:'bad',t:'bad'},
    {l:'Config Trunk',v:'switchport mode trunk + nonegotiate on both ends',why:'Must configure trunk on BOTH sides. Disable DTP with nonegotiate to prevent VLAN hopping attacks via DTP negotiation.',cli:'interface G0/24\n switchport mode trunk\n switchport nonegotiate\n switchport trunk native vlan 999\n switchport trunk allowed vlan 10,20,30',tip:'Always static trunk + nonegotiate. Never rely on DTP auto-negotiation.',tt:'good'},
    {l:'DTP Modes',v:'auto+desirable=trunk · auto+auto=access · trunk+any=trunk',why:'DTP is a security risk — attackers can negotiate a trunk. Always disable with nonegotiate on static trunk ports.',cli:'<span class="cli-comment">! Disable DTP</span>\nswitchport nonegotiate\n<span class="cli-comment">! DTP: auto+auto=access · desirable+auto=trunk</span>\nshow interfaces G0/24 switchport  ! check negotiation',tip:'switchport nonegotiate disables DTP completely.',tt:'bad',t:'warn'},
    {l:'Allowed VLANs',v:'Use ADD to append — "allowed vlan 20" replaces the entire list!',why:'"switchport trunk allowed vlan 20" with no keyword REPLACES the list with just VLAN 20, dropping all others. Always use "add".',cli:'<span class="cli-comment">! CORRECT</span>\nswitchport trunk allowed vlan add 20\n<span class="cli-comment">! WRONG - replaces entire list!</span>\n<span class="cli-comment">! switchport trunk allowed vlan 20</span>',tip:'"allowed vlan 20" without add = replaces the entire allowed VLAN list.',tt:'bad',t:'warn'},
    {l:'Verify',v:'show interfaces trunk — four sections to check',why:'Shows: mode/encap/status/native VLAN, allowed VLANs, VLANs allowed AND active, VLANs in STP Forwarding.',cli:'show interfaces trunk\nshow interfaces G0/24 trunk',tip:'A VLAN can be "allowed" but not "active" if it doesn\'t exist in the VLAN database.'},
    {l:'Frame Size',v:'802.1Q adds 4 bytes — max frame 1518→1522 bytes',why:'The 4-byte 802.1Q tag increases max Ethernet frame size. If physical MTU is set to exactly 1518, tagged frames may be dropped.',cli:'show interfaces G0/0 | include MTU',tip:'Baby Giant frames need to be enabled on some older platforms for 802.1Q to work.'}
  ]
},

/* ── 3 EtherChannel ── */
{ num:'04', title:'EtherChannel (LACP / PAgP)',
  desc:'EtherChannel bundles 2–8 physical links into one logical link. STP sees it as a single connection — no blocking, no wasted bandwidth. LACP (802.3ad) is the open standard; PAgP is Cisco-only.',
  steps:[
  { label:'Step 1 — Problem: STP Blocks Redundant Links',
    html:`<b>Without EtherChannel:</b> Four 1 Gbps links connect SW1 to the distribution switch. STP sees four equal-cost links and blocks three of them to prevent loops. Result: only 1 Gbps of the available 4 Gbps is usable. The other 3 Gbps sits idle — wasted capital expenditure.`,
    svg: () => D.defs()+
      D.sw('SW1',180,205,'#e03e3e')+D.sw('DIST',460,205,'#e03e3e')+
      `<text x="320" y="28" text-anchor="middle" font-family="Syne" font-size="12" font-weight="700" fill="#0a0c14">4 × 1 Gbps Links — STP Blocks 3</text>`+
      D.ln(218,190,422,190,'b')+`<text x="320" y="183" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#27ae60">ACTIVE — 1 Gbps forwarding</text>`+
      D.ln(218,202,422,202,'r')+`<text x="320" y="216" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">STP BLOCKED — idle, 0 Gbps</text>`+
      D.ln(218,214,422,214,'r')+
      D.ln(218,226,422,226,'r')+
      D.pkt(218,190,422,190,'#1a6fdb',0)+
      `<rect x="60" y="270" width="520" height="60" rx="8" fill="#fef2f2" stroke="#e03e3e" stroke-width="1"/>
       <text x="320" y="290" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#e03e3e">Wasted capacity: 3 Gbps (75%) blocked by STP</text>
       <text x="320" y="308" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#555">STP cannot distinguish between 4 separate links vs 1 EtherChannel</text>
       <text x="320" y="322" text-anchor="middle" font-family="DM Sans" font-size="9" fill="#555">Those 3 links only activate if the active link fails (30–50s STP convergence)</text>`
  },
  { label:'Step 2 — LACP Negotiation',
    html:`<b>LACP (IEEE 802.3ad):</b> Each switch sends LACP PDUs every second on each port. PDUs contain: System ID, Port ID, Key (must match), State flags. <code>mode active</code> = sends and responds. <code>mode passive</code> = only responds. <b>Active + Active</b> or <b>Active + Passive</b> form a bundle. Passive + Passive = no bundle.`,
    svg: () => D.defs()+
      D.sw('SW1',155,200,'#1a6fdb')+
      `<text x="80" y="188" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">channel-group 1</text>`+
      `<text x="80" y="199" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">mode active</text>`+
      D.sw('DIST',485,200,'#1a6fdb')+
      `<text x="490" y="188" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">channel-group 1</text>`+
      `<text x="490" y="199" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">mode active</text>`+
      D.ln(193,190,447,190)+D.bpdu(193,190,447,190,0,'LACP','#1a6fdb')+
      D.ln(193,202,447,202)+D.bpdu(447,202,193,202,0.5,'LACP','#1a6fdb')+
      D.ln(193,214,447,214)+D.bpdu(193,214,447,214,0.3,'LACP','#1a6fdb')+
      D.ln(193,226,447,226)+D.bpdu(447,226,193,226,0.8,'LACP','#1a6fdb')+
      `<rect x="30" y="280" width="580" height="100" rx="8" fill="#f0f6ff" stroke="#1a6fdb" stroke-width="1"/>
       <text x="320" y="300" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#1a6fdb">LACP PDU Contents</text>
       <text x="50" y="318" font-family="JetBrains Mono" font-size="8" fill="#555">System ID: 0x8000 + switch MAC address</text>
       <text x="50" y="334" font-family="JetBrains Mono" font-size="8" fill="#555">Port ID: port priority + port number</text>
       <text x="50" y="350" font-family="JetBrains Mono" font-size="8" fill="#555">Key: operational key (must match on both ends)</text>
       <text x="50" y="366" font-family="JetBrains Mono" font-size="8" fill="#555">State: Active/Passive · Timeout · Aggregatable · In-Sync · Collecting · Distributing</text>`
  },
  { label:'Step 3 — Port-Channel Active: 4× Bandwidth',
    html:`<b>EtherChannel load balancing is hash-based, NOT round-robin.</b> The same flow (same src+dst) ALWAYS uses the same physical link. This ensures in-order packet delivery for each TCP session.<br><br><b>Load balance methods</b> (configure with <code>port-channel load-balance METHOD</code>):<br>• <code>src-mac</code> — hash on source MAC only<br>• <code>dst-mac</code> — hash on destination MAC<br>• <code>src-dst-mac</code> — XOR of both MACs (default Layer 2)<br>• <code>src-dst-ip</code> — XOR of src+dst IP (best for routed traffic)<br>• <code>src-dst-port</code> — XOR of TCP/UDP ports (best spread for same hosts)<br><br>Best practice: use <code>src-dst-ip</code> for uplinks, <code>src-dst-mac</code> for access ports. Verify: <code>show etherchannel load-balance</code>. <b>LACP timers:</b> Fast = 1s hello / 3s timeout. Slow = 30s hello / 90s timeout.`,
    svg: () => D.defs()+
      D.sw('SW1',155,200,'#27ae60')+D.sw('DIST',485,200,'#27ae60')+
      `<rect x="193" y="155" width="254" height="105" rx="8" fill="#27ae600e" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
       <text x="320" y="174" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#27ae60">Po1 — 4 Gbps Logical Link</text>
       <text x="320" y="188" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#555">STP sees 1 link · No blocking</text>`+
      D.ln(193,182,447,182,'g')+`<text x="320" y="176" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">Gi0/0</text>`+
      D.ln(193,196,447,196,'g')+
      D.ln(193,210,447,210,'g')+
      D.ln(193,224,447,224,'g')+`<text x="320" y="245" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">Gi0/3</text>`+
      D.pkt(193,182,447,182,'#1a6fdb',0)+
      D.pkt(193,196,447,196,'#27ae60',0.3)+
      D.pkt(193,210,447,210,'#8e44ad',0.6)+
      D.pkt(193,224,447,224,'#f39c12',0.9)+
      `<rect x="30" y="295" width="580" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
       <text x="320" y="314" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#0a0c14">show etherchannel summary</text>
       <text x="50" y="332" font-family="JetBrains Mono" font-size="9" fill="#555">Group  Port-channel  Protocol  Ports</text>
       <line x1="50" y1="338" x2="590" y2="338" stroke="#dee2e6" stroke-width="1"/>
       <text x="50" y="354" font-family="JetBrains Mono" font-size="9" fill="#27ae60">1      Po1(SU)       LACP      Gi0/0(P) Gi0/1(P) Gi0/2(P) Gi0/3(P)</text>
       <text x="50" y="372" font-family="JetBrains Mono" font-size="8" fill="#8892a4">SU = Layer2 Up · P = bundled in port-channel · D = down</text>`
  }],
  keys:[
    {l:'LACP Modes',v:'Active+Active ✓  Active+Passive ✓  Passive+Passive ✗',why:'LACP (802.3ad) is open standard. Active sends PDUs and initiates. Passive only responds. Two passive = no bundle (neither initiates).',cli:'interface range G0/0-3\n channel-group 1 mode active\nshow lacp neighbor\nshow etherchannel summary',tip:'Use LACP (open standard) over PAgP (Cisco-only) for new deployments.',tt:'good'},
    {l:'PAgP Modes',v:'Desirable+Desirable ✓  Desirable+Auto ✓  Auto+Auto ✗',why:'PAgP is Cisco-proprietary. Desirable = sends PDUs. Auto = only responds. Only works between Cisco devices.',cli:'interface range G0/0-3\n channel-group 1 mode desirable\nshow pagp neighbor',tip:'Never use PAgP in mixed-vendor environments. Use LACP instead.',tt:'warn'},
    {l:'Config Order',v:'Create bundle on physical ports, then configure the Po interface',why:'Add physical ports to the bundle first (channel-group). Then configure trunking/VLANs on the port-channel interface — members inherit.',cli:'interface range G0/0-3\n channel-group 1 mode active\ninterface port-channel 1\n switchport mode trunk\n switchport trunk native vlan 999',tip:'ALL member ports need identical speed/duplex/trunk config/VLANs or bundle won\'t form.',tt:'bad',t:'warn'},
    {l:'Configure on Po',v:'Set trunk/VLAN config on port-channel 1 not physical ports',why:'Configuring trunking directly on member ports and then adding them to a channel can cause inconsistencies. Configure once on the Po interface.',cli:'interface port-channel 1\n switchport mode trunk\n switchport trunk allowed vlan 10,20,30\nshow etherchannel detail',tip:'Config mismatch between member ports is the most common EtherChannel failure.',tt:'bad',t:'good'},
    {l:'Verify',v:'show etherchannel summary — SU=up · P=in bundle · I=standalone',why:'SU = Layer2, in-use. P = bundled. D = down. I = stand-alone (not in bundle, check for mismatch). A single I flag means one port refused to join.',cli:'show etherchannel summary\nshow etherchannel 1 detail\nshow lacp neighbor',tip:'Flag I (stand-alone) = port refused to join. Find the mismatch.',tt:'warn'},
    {l:'Load Balancing',v:'Hash-based NOT round-robin — same flow always same link',why:'XOR hash ensures in-order delivery for each TCP flow. Configure method based on traffic: src-dst-ip for routed uplinks, src-dst-mac for access.',cli:'port-channel load-balance src-dst-ip\nshow etherchannel load-balance',tip:'src-dst-ip gives best distribution for routed traffic.',tt:'good'}
  ]
},

/* ── 4 STP Root Election ── */
{ num:'05', title:'STP Root Bridge Election',
  desc:'The Root Bridge is the reference point for the entire spanning tree. Every non-root switch calculates port costs relative to the root. Control this with manual priority configuration — never leave it to MAC address chance.',
  steps:[
  { label:'Step 1 — Bridge ID Structure',
    html:`<b>Bridge ID = Priority (16 bits) + MAC (48 bits).</b> But in 802.1D the priority field is split: 4-bit priority value + 12-bit System ID Extension (= VLAN number for PVST+). So priority must be a multiple of 4096. Default = 32768. The switch with the <b>numerically lowest Bridge ID wins</b>.`,
    svg: () => D.defs()+
      `<text x="320" y="42" text-anchor="middle" font-family="Syne" font-size="13" font-weight="800" fill="#0a0c14">Bridge ID = 8 bytes total</text>`+
      `<rect x="30" y="56" width="580" height="60" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
       <rect x="30" y="56" width="80" height="60" rx="4" fill="#f39c1222" stroke="#f39c12" stroke-width="1.5"/>
       <text x="70" y="82" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#f39c12">Priority</text>
       <text x="70" y="97" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#555">4 bits</text>
       <text x="70" y="109" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">× 4096</text>
       <rect x="112" y="56" width="160" height="60" rx="4" fill="#1a6fdb22" stroke="#1a6fdb" stroke-width="1.5"/>
       <text x="192" y="82" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#1a6fdb">System ID Extension</text>
       <text x="192" y="97" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#555">12 bits = VLAN number</text>
       <text x="192" y="109" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">0–4094</text>
       <rect x="274" y="56" width="336" height="60" rx="4" fill="#27ae6022" stroke="#27ae60" stroke-width="1.5"/>
       <text x="442" y="82" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#27ae60">MAC Address</text>
       <text x="442" y="97" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#555">48 bits = 6 bytes</text>
       <text x="442" y="109" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">burned-in or virtual</text>`+
      `<rect x="30" y="140" width="580" height="110" rx="8" fill="#f0f6ff" stroke="#1a6fdb" stroke-width="1"/>
       <text x="320" y="160" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#1a6fdb">Priority Values (must be multiples of 4096)</text>
       <text x="50" y="180" font-family="JetBrains Mono" font-size="9" fill="#27ae60" font-weight="700">0       → always wins (use carefully)</text>
       <text x="50" y="196" font-family="JetBrains Mono" font-size="9" fill="#1a6fdb" font-weight="700">24576   → spanning-tree vlan 1 root primary (set by "root primary")</text>
       <text x="50" y="212" font-family="JetBrains Mono" font-size="9" fill="#8892a4">28672   → spanning-tree vlan 1 root secondary</text>
       <text x="50" y="228" font-family="JetBrains Mono" font-size="9" fill="#555">32768   → default (all switches start here)</text>
       <text x="50" y="244" font-family="JetBrains Mono" font-size="9" fill="#555">61440   → highest, least likely to win</text>`
  },
  { label:'Step 2 — Path Cost Calculation',
    html:`<b>Root Path Cost</b> = sum of interface costs from a switch to the root bridge. Default costs: 10 Mbps=100, 100 Mbps=19, <b>1 Gbps=4</b>, 10 Gbps=2. The Root Port on each non-root switch is the port with the <b>lowest accumulated cost to root</b>. If costs tie, lowest port priority wins. If still tied, lowest port number wins.`,
    svg: () => D.defs()+
      D.sw('ROOT',320,60,'#27ae60')+D.crown(320,30)+
      `<text x="320" y="37" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#27ae60">Root Bridge</text>`+
      D.sw('SW-A',130,210)+D.sw('SW-B',510,210)+D.sw('SW-C',320,340)+
      `<text x="130" y="190" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">SW-A</text>`+
      `<text x="510" y="190" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">SW-B</text>`+
      `<text x="320" y="320" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">SW-C</text>`+
      // Root to SW-A: GE cost 4
      D.ln(285,78,168,193,'b')+
      `<text x="208" y="126" font-family="JetBrains Mono" font-size="8" fill="#27ae60">GE cost=4</text>`+
      // Root to SW-B: GE cost 4
      D.ln(355,78,472,193,'b')+
      `<text x="415" y="126" font-family="JetBrains Mono" font-size="8" fill="#27ae60">GE cost=4</text>`+
      // SW-A to SW-C: GE cost 4 (total = 8)
      D.ln(168,228,285,325)+
      `<text x="200" y="285" font-family="JetBrains Mono" font-size="8" fill="#555">cost=4 total→8</text>`+
      // SW-B to SW-C: GE cost 4 (total = 8)
      D.ln(472,228,355,325)+
      `<text x="425" y="285" font-family="JetBrains Mono" font-size="8" fill="#555">cost=4 total→8</text>`+
      // Direct Root to SW-C would be cost 4 if link exists
      D.pkt(285,78,168,193,'#1a6fdb',0)+D.pkt(355,78,472,193,'#1a6fdb',0.6)+
      `<rect x="30" y="380" width="580" height="30" rx="6" fill="#f0f9f4" stroke="#27ae60" stroke-width="1"/>
       <text x="320" y="400" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#27ae60">SW-C Root Port: tie on cost (8 = 8) → compare Port Priority → compare Port Number</text>`
  },
  { label:'Step 3 — Manual Control',
    html:`<b>How <code>root primary</code> works:</b> The command checks the current root's priority, then sets this switch's priority to either 24576 OR to (current_root_priority - 4096), whichever is lower. This guarantees it wins regardless of current topology.<br><br><b>root secondary</b> sets priority to 28672 — one step above primary's 24576 but well below default 32768, so it wins if primary fails.<br><br><b>Full tiebreaker worked example:</b><br>SW1: Priority=32768 + VLAN1 = 32769, MAC=aa:aa → BID = <b>32769.aa:aa</b><br>SW2: Priority=32768 + VLAN1 = 32769, MAC=bb:bb → BID = <b>32769.bb:bb</b><br>SW3: Priority=24576 + VLAN1 = 24577, MAC=cc:cc → BID = <b>24577.cc:cc ← WINS</b> (lower priority)<br>SW3 wins despite having the highest MAC, because priority is checked FIRST.`,
    svg: () => D.defs()+
      D.sw('CORE',320,80,'#27ae60','Primary Root')+D.crown(320,50)+
      D.sw('DIST1',130,240,'#1a6fdb','Secondary Root')+
      D.sw('DIST2',510,240,'#8892a4')+
      D.sw('ACCESS1',80,370)+D.sw('ACCESS2',260,370)+D.sw('ACCESS3',380,370)+D.sw('ACCESS4',560,370)+
      D.ln(285,98,168,222,'b')+D.ln(355,98,472,222,'b')+
      D.ln(130,258,100,353)+D.ln(130,260,240,353)+
      D.ln(510,258,370,353)+D.ln(510,260,545,353)+
      D.pkt(285,98,168,222,'#27ae60',0)+D.pkt(355,98,472,222,'#1a6fdb',0.5)+
      `<rect x="30" y="390" width="260" height="15" rx="4" fill="#27ae6022" stroke="#27ae60" stroke-width="1"/>
       <text x="160" y="402" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">spanning-tree vlan 1 root primary</text>`+
      `<rect x="30" y="408" width="260" height="15" rx="4" fill="#1a6fdb22" stroke="#1a6fdb" stroke-width="1"/>
       <text x="160" y="420" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#1a6fdb">spanning-tree vlan 1 root secondary</text>`
  }],
  keys:[
    {l:'Bridge ID',v:'Priority (4096×) + System ID Ext (VLAN#) + MAC',why:'Priority field is 4 bits × 4096 = must be multiples of 4096. Default 32768. IOS rejects non-multiple values.',cli:'spanning-tree vlan 1 priority 24576\nshow spanning-tree\n<span class="cli-comment">! Bridge ID: Priority 32769 = 32768+VLAN1</span>',tip:'Priority must be a multiple of 4096. IOS rejects non-multiples.',tt:'warn'},
    {l:'root primary',v:'Sets priority to 24576 (or lower) — guarantees win',why:'Command checks current root priority and sets this switch to (current_root - 4096) or 24576, whichever is lower. Guarantees this switch beats the current root.',cli:'<span class="cli-highlight">spanning-tree vlan 1 root primary</span>\nshow spanning-tree vlan 1 | include This\n<span class="cli-comment">! "This bridge is the root" = won</span>',tip:'"This bridge is the root" confirms election win.',tt:'good',t:'good'},
    {l:'root secondary',v:'Sets priority to 28672 — takes over if primary fails',why:'root secondary = priority 28672. One step above primary\'s 24576, well below default 32768. Automatically wins if primary fails.',cli:'spanning-tree vlan 1 root secondary\n<span class="cli-comment">! Equivalent:</span>\nspanning-tree vlan 1 priority 28672',tip:'Always configure both primary AND secondary. Without secondary, any switch could become root when primary fails.',tt:'warn',t:'good'},
    {l:'Path Cost',v:'GE=4 · FastE=19 · 10GE=2 · Serial≈64',why:'Cost = 20,000,000 / bandwidth_kbps. Root Port = port with lowest accumulated cost to root. Tune with: spanning-tree cost [value] on interface.',cli:'interface G0/0\n spanning-tree cost 2\nshow spanning-tree vlan 1 detail  ! shows cost per port',tip:'For 10GE networks: auto-cost reference-bandwidth 10000 to differentiate costs.'},
    {l:'Verify',v:'show spanning-tree vlan 1',why:'Shows root bridge identification, port roles and states, path costs. Essential for understanding current STP topology.',cli:'show spanning-tree vlan 1\nshow spanning-tree summary\nshow spanning-tree vlan 1 detail',tip:'"This bridge is the root" = you are root. Compare Root ID vs Bridge ID.',tt:'good'},
    {l:'Priority 0',v:'Always wins but use deliberately — causes issues if on multiple switches',why:'Priority 0 = guaranteed root regardless of MAC. If multiple switches have priority 0, the one with lowest MAC wins. Use root primary instead.',cli:'<span class="cli-comment">! Nuclear option</span>\nspanning-tree vlan 1 priority 0\n<span class="cli-comment">! Better approach</span>\nspanning-tree vlan 1 root primary',tip:'Priority 0 on multiple switches = unpredictable results. Use root primary.',tt:'warn',t:'bad'}
  ]
},

/* ── 5 Port Security ── */
{ num:'06', title:'Port Security',
  desc:'Port security limits which MAC addresses can communicate through a switch port. When a violation occurs — too many MACs or an unknown MAC — the port can shutdown, restrict, or protect depending on configuration.',
  steps:[
  { label:'Step 1 — Normal Operation with Sticky MACs',
    html:`<b>Sticky learning:</b> The port dynamically learns PC1's MAC (aa:bb:cc:dd:ee:ff) and locks it into the running-config. Max 1 MAC allowed. Traffic flows normally. The sticky MAC survives a reload if you <code>copy run start</code>. Check status with <code>show port-security interface</code>.`,
    svg: () => D.defs()+
      D.sw('SW1',340,175,'#27ae60')+
      `<text x="260" y="162" font-family="JetBrains Mono" font-size="7" fill="#27ae60">G0/1: max=1  violation=shutdown  sticky</text>`+
      D.pc('PC1',95,175,'#27ae60','aa:bb:cc')+
      D.ln(159,179,305,184,'g')+D.pkt(159,179,305,184,'#27ae60',0)+
      `<rect x="80" y="260" width="230" height="120" rx="8" fill="#f0f9f4" stroke="#27ae60" stroke-width="1"/>
       <text x="195" y="280" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#27ae60">Port Security Status</text>
       <text x="95" y="298" font-family="JetBrains Mono" font-size="8" fill="#555">Port: Gi0/1</text>
       <text x="95" y="313" font-family="JetBrains Mono" font-size="8" fill="#555">Port Status: Secure-up</text>
       <text x="95" y="328" font-family="JetBrains Mono" font-size="8" fill="#555">Violation Mode: Shutdown</text>
       <text x="95" y="343" font-family="JetBrains Mono" font-size="8" fill="#555">Max MAC: 1  Current: 1</text>
       <text x="95" y="358" font-family="JetBrains Mono" font-size="8" fill="#27ae60">Sticky MACs: aa:bb:cc:dd:ee:ff</text>`+
      D.info(345,260,250,'Full Config',['interface G0/1',' switchport mode access',' switchport port-security',' switchport port-security max 1',' switchport port-security',' mac-address sticky',' switchport port-security',' violation shutdown'],'#1a6fdb')
  },
  { label:'Step 2 — Violation: Rogue Device Detected',
    html:`<b>Violation triggered:</b> Someone unplugs PC1 and connects a hub with PC1+laptop. The hub sends both MACs. The second MAC (11:22:33) violates max=1. Port immediately goes <b>err-disabled</b>. A syslog message is generated. The violation counter increments. The port stays down until an admin manually recovers it.`,
    svg: () => D.defs()+
      D.sw('SW1',340,155,'#e03e3e')+
      `<text x="255" y="140" font-family="JetBrains Mono" font-size="7" fill="#e03e3e">G0/1: ERR-DISABLED!</text>`+
      D.pc('PC1',80,110,'#8892a4','aa:bb:cc')+`<text x="80" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8892a4">UNPLUGGED</text>`+
      `<rect x="40" y="165" width="70" height="30" rx="4" fill="#e03e3e22" stroke="#e03e3e" stroke-width="1"/>
       <text x="75" y="184" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#e03e3e">HUB</text>`+
      D.pc('PC1b',30,280,'#8892a4','aa:bb:cc')+D.pc('Laptop',140,280,'#e03e3e','11:22:33')+
      D.ln(75,195,300,162,'r')+D.X(190,178)+
      `<rect x="350" y="220" width="255" height="140" rx="8" fill="#fef2f2" stroke="#e03e3e" stroke-width="1"/>
       <text x="478" y="240" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#e03e3e">Violation Response</text>
       <text x="365" y="258" font-family="JetBrains Mono" font-size="8" fill="#555">Syslog: %PORT_SECURITY-2-PSECURE</text>
       <text x="365" y="272" font-family="JetBrains Mono" font-size="8" fill="#555">VIOLATION on Gi0/1</text>
       <text x="365" y="290" font-family="JetBrains Mono" font-size="8" fill="#e03e3e">Port → err-disable</text>
       <text x="365" y="306" font-family="JetBrains Mono" font-size="8" fill="#555">Violation counter: 1</text>
       <text x="365" y="322" font-family="JetBrains Mono" font-size="8" fill="#555">Recovery:</text>
       <text x="365" y="338" font-family="JetBrains Mono" font-size="9" fill="#1a6fdb">int G0/1 → shut → no shut</text>
       <text x="365" y="354" font-family="JetBrains Mono" font-size="8" fill="#8892a4">or: errdisable recovery cause psecure</text>`
  },
  { label:'Step 3 — Three Violation Modes',
    html:`<b>Choose based on security vs availability requirements:</b> Shutdown is most secure and most disruptive. Restrict drops bad frames but keeps the port up and sends alerts. Protect silently drops — you may never know an attack happened. For exams: remember that Protect has NO counter and NO syslog.`,
    svg: () => D.defs()+
      D.info(20,50,185,'SHUTDOWN (default)',['Port → err-disable','ALL traffic dropped','Syslog generated','SNMP trap sent','Violation counter++','','Manual recovery:','  shut → no shut'],'#e03e3e')+
      D.info(228,50,185,'RESTRICT',['Bad frames dropped','Port stays UP','Syslog generated','SNMP trap sent','Violation counter++','','Auto-recovery: yes','Good: IDS visibility'],'#f39c12')+
      D.info(436,50,185,'PROTECT',['Bad frames dropped','Port stays UP','NO syslog','NO SNMP trap','NO counter increment','','Silent discard only','Risk: invisible attack'],'#8892a4')+
      `<rect x="20" y="295" width="600" height="105" rx="8" fill="#f0f6ff" stroke="#1a6fdb" stroke-width="1"/>
       <text x="320" y="316" text-anchor="middle" font-family="Syne" font-size="11" font-weight="700" fill="#1a6fdb">Comparison Summary</text>
       <text x="40" y="336" font-family="JetBrains Mono" font-size="8" fill="#8892a4">Mode        Port    Syslog   Counter   Recovery</text>
       <line x1="40" y1="342" x2="600" y2="342" stroke="#dee2e6" stroke-width="1"/>
       <text x="40" y="358" font-family="JetBrains Mono" font-size="9" fill="#e03e3e">Shutdown    DOWN    YES      YES       Manual (shut/no shut)</text>
       <text x="40" y="374" font-family="JetBrains Mono" font-size="9" fill="#f39c12">Restrict    UP      YES      YES       Automatic</text>
       <text x="40" y="390" font-family="JetBrains Mono" font-size="9" fill="#8892a4">Protect     UP      NO       NO        Automatic (invisible!)</text>`
  }],
  keys:[
    {l:'Enable',v:'switchport port-security — set access mode first',why:'Port security only works on static access or trunk ports. If port is in dynamic mode (auto/desirable), the command is rejected. Always set "switchport mode access" first.',cli:'interface G0/1\n switchport mode access\n switchport port-security\n switchport port-security maximum 2\n switchport port-security mac-address sticky\n switchport port-security violation shutdown',tip:'Error "Command rejected: G0/1 is a dynamic port" = set mode access first.',tt:'warn'},
    {l:'Maximum',v:'Default max = 1 MAC per port',why:'Controls how many MACs can be on the port simultaneously. If a hub or small switch is behind the port, increase maximum accordingly.',cli:'switchport port-security maximum 3\nshow port-security interface G0/1  ! shows Max/Current count',tip:'A hub behind a port sends multiple MACs — increase maximum or it will violate.',t:'warn'},
    {l:'Sticky',v:'Learns + saves MAC to running-config — survives reload if saved',why:'Sticky combines dynamic learning (convenient) with persistence. After a device connects, its MAC is added to running-config. Run "copy run start" to survive reload.',cli:'switchport port-security mac-address sticky\n<span class="cli-comment">! MAC auto-appears in running-config</span>\ncopy running-config startup-config  ! to survive reload',tip:'Sticky MACs survive reload ONLY if you save running-config to startup-config.',tt:'warn',t:'good'},
    {l:'Recovery',v:'shutdown then no shutdown — or errdisable recovery',why:'When violation=shutdown triggers, port goes err-disabled. Manual: shutdown then no shutdown. Automatic: errdisable recovery cause psecure-violation.',cli:'interface G0/1\n shutdown\n no shutdown\n<span class="cli-comment">! Or auto-recover</span>\nerrdisable recovery cause psecure-violation\nerrdisable recovery interval 60\nshow interface status err-disabled',tip:'Violation counter in show port-security shows how many times it triggered.',t:'warn'},
    {l:'Verify',v:'show port-security interface G0/1',why:'Shows status (Secure-up/Secure-shutdown), violation mode, current/max MAC count, violation counter, and last violating MAC.',cli:'show port-security interface G0/1\nshow port-security\nshow port-security address',tip:'show port-security shows all secure ports summary. "interface G0/1" for per-port detail.'},
    {l:'Exam Trap',v:'Protect = silent drop, NO logs, NO counter — invisible attack',why:'Protect mode silently drops frames from unknown MACs, keeps port up, generates zero alerts. Attacker connects completely undetected.',cli:'<span class="cli-comment">! Shutdown: most secure, disruptive</span>\nviolation shutdown\n<span class="cli-comment">! Restrict: drops + alerts, port stays up</span>\nviolation restrict\n<span class="cli-comment">! Protect: silent drop, invisible</span>\nviolation protect',tip:'Protect mode: attacker connects undetected. No syslog, no SNMP, no counter.',tt:'bad',t:'bad'}
  ]
},

/* ── 6 DHCP Snooping + DAI ── */
{ num:'07', title:'DHCP Snooping & Dynamic ARP Inspection',
  desc:'DHCP Snooping creates a binding table of legitimate IP-to-MAC-to-port mappings. DAI uses this table to validate ARP messages — together they block rogue DHCP servers and ARP spoofing/poisoning attacks.',
  steps:[
  { label:'Step 1 — Rogue DHCP Server Attack',
    html:`<b>Without DHCP Snooping:</b> Any device can send DHCP Offers. The attacker plugs in a rogue DHCP server that responds faster than the real one. Clients receive: rogue gateway → all traffic flows through attacker → complete man-in-the-middle. Users notice nothing.`,
    svg: () => D.defs()+
      D.sw('SW1',320,175)+
      D.pc('CLIENT',80,175,'#555')+`<text x="80" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#555">sends DISCOVER</text>`+
      D.srv('Real DHCP',80,310,'#27ae60')+`<text x="80" y="355" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#27ae60">GW: 10.0.0.1</text>`+
      D.pc('ATTACKER',560,175,'#e03e3e')+`<text x="560" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#e03e3e">Rogue DHCP</text>`+
      `<text x="560" y="145" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#e03e3e">GW: 10.0.0.99</text>`+
      D.ln(144,179,285,182)+D.ln(144,306,285,192)+
      D.ln(524,179,355,182,'a')+
      D.bpdu(524,179,355,182,0,'OFFER','#e03e3e')+
      `<text x="320" y="60" text-anchor="middle" font-family="Syne" font-size="12" font-weight="700" fill="#e03e3e">⚠ Rogue OFFER arrives first!</text>`+

  { label:'Step 2 — DHCP Snooping Blocks Rogue Server',
    html:`<b>DHCP Snooping enabled:</b> Uplink to DHCP server = <b>trusted</b> (can send Offers/Acks). All access ports = <b>untrusted</b> (can only send Discover/Request). The rogue server's Offer arriving on an untrusted port is silently dropped.<br><br><b>DHCP Starvation prevention:</b> An attacker can flood DISCOVER packets with spoofed MACs to exhaust the IP pool. Rate-limit untrusted ports: <code>ip dhcp snooping limit rate 15</code> (packets/second). Port that exceeds rate → err-disabled.<br><br><b>Option 82 (DHCP Relay Information):</b> When ip helper-address is configured, IOS adds option 82 (circuit-id = port info) to relayed DISCOVER packets. Some DHCP servers reject option 82 from unexpected sources. Fix: <code>no ip dhcp snooping information option</code> on the switch to strip it.<br><br>The binding table records every successful lease — this is what DAI uses to validate ARP replies.`,

       <line x1="148" y1="338" x2="520" y2="338" stroke="#dee2e6" stroke-width="1"/>

  { label:'Step 3 — DAI Validates ARP Replies',

  keys:[
    {l:'Enable Snooping',v:'ip dhcp snooping + ip dhcp snooping vlan 10',why:'Must enable globally AND per-VLAN. VLANs not listed are unprotected. All access ports default to untrusted.',cli:'ip dhcp snooping\nip dhcp snooping vlan 10\nip dhcp snooping vlan 20,30\nshow ip dhcp snooping',tip:'Enabling globally without specifying VLANs = nothing is actually protected.',tt:'warn'},

    {l:'Verify',v:'show ip dhcp snooping binding',why:'Shows every active DHCP lease: MAC, IP, lease time, VLAN, interface. This table is what DAI uses for ARP validation.',cli:'show ip dhcp snooping binding\nshow ip dhcp snooping\nshow ip arp inspection vlan 10\nshow ip arp inspection statistics',tip:'Empty binding table after snooping enabled = no DHCP traffic seen yet.',tt:'warn'},
    {l:'Order Matters',v:'Enable DHCP Snooping BEFORE DAI — DAI needs the binding table',why:'DAI uses the snooping binding table. If DAI runs with an empty table, it drops ALL ARP traffic. Always: enable snooping → wait for DHCP → then enable DAI.',cli:'<span class="cli-comment">! Step 1</span>\nip dhcp snooping\nip dhcp snooping vlan 10\n<span class="cli-comment">! Step 2: wait for table entries</span>\nshow ip dhcp snooping binding\n<span class="cli-comment">! Step 3</span>\nip arp inspection vlan 10',tip:'DAI with empty binding table = all ARP blocked = network outage.',tt:'bad',t:'bad'}

/* ── 7 OSPF ── */
{ num:'09', title:'OSPF — Open Shortest Path First',
  desc:'OSPF is a link-state IGP. Each router builds a complete topology map (LSDB) by flooding LSAs, then independently runs Dijkstra\'s SPF algorithm. AD=110. No hop-count limit. Supports VLSM. Scales to large networks with areas.',
  steps:[
  { label:'Step 1 — Hello Packets & Neighbour States',
    html:`<b>Router-ID selection</b> (highest priority first):<br>① <code>router-id X.X.X.X</code> manually configured<br>② Highest IP on a <b>loopback</b> interface (even if not in OSPF network statement)<br>③ Highest IP on any active interface at OSPF startup<br>⚠ Router-ID is chosen at startup — changing it requires <code>clear ip ospf process</code>.<br><br>
<b>OSPF multicast addresses:</b><br>• <b>224.0.0.5</b> = AllSPFRouters — all OSPF routers listen here (Hello, LSU, LSAck)<br>• <b>224.0.0.6</b> = AllDRouters — DR and BDR only listen here (DROthers send updates here)<br>Using multicast instead of broadcast means non-OSPF devices ignore these packets entirely.<br><br>
<b>Neighbor state progression:</b> Down → Init (received Hello, not in neighbor list yet) → <b>2-Way</b> (see own RID in neighbor's Hello) → ExStart (master/slave negotiation) → Exchange (DBD exchange) → Loading (LSR/LSU/LSAck) → <b>Full</b> (identical LSDBs). On broadcast: DROthers stop at 2-Way with each other (only Full with DR/BDR).`,
    svg: () => D.defs()+
      D.rt('R1',95,200,'#f39c12','1.1.1.1')+D.rt('R2',290,105,'#f39c12','2.2.2.2')+

  { label:'Step 2 — LSDB & LSA Types',
    html:`<b>OSPF Areas:</b> All non-backbone areas (Area 1, 2, etc.) MUST connect to Area 0 (backbone). This prevents routing loops between areas. An ABR (Area Border Router) sits between areas and runs SPF independently for each. A router in Area 1 only knows the topology of Area 1 in detail — it sees other areas as summaries.<br><br>
<b>LSA Types (CCNA scope):</b><br>
• <b>Type 1 Router LSA:</b> Every OSPF router generates one describing its links. Flooded within the area only.<br>
• <b>Type 2 Network LSA:</b> DR generates for each broadcast segment. Contains all routers on that segment.<br>
• <b>Type 3 Summary LSA:</b> ABR generates when advertising routes between areas. Carries prefix + cost.<br>
• <b>Type 5 AS External LSA:</b> ASBR generates for redistributed external routes. Flooded everywhere except stubs.<br><br>
<b>All routers in an area have identical LSDBs.</b> Verify: <code>show ip ospf database</code> — compare router/network LSA counts on two routers in same area. They must match exactly.`,

       <text x="45" y="366" font-family="JetBrains Mono" font-size="8" fill="#555">Type 1: Router LSA (every router)</text>

  },
  { label:'Step 3 — DR/BDR Election on Broadcast',
    html:`<b>Broadcast network election:</b> On Ethernet, OSPF elects a DR and BDR to reduce adjacency overhead. n routers without DR/BDR = n(n-1)/2 adjacencies. With DR/BDR = 2(n-1). DR election: highest OSPF priority (default 1) → tie: highest Router-ID. Priority 0 = never DR. DR sends to 224.0.0.5. Others send to 224.0.0.6 (DR/BDR only).`,
    svg: () => D.defs()+
      D.sw('SW',320,195)+

      D.rt('R3',130,300,'#f39c12','pri=1')+D.rt('R4',510,300,'#f39c12','pri=1')+

      D.cb(120,370,400,30,'ip ospf priority 100 → sets this interface as DR · priority 0 = never DR')
  },
  { label:'Step 4 — SPF Calculation & Cost',
    html:`<b>Cost = 100,000,000 / bandwidth.</b> GigabitEthernet = 100M/1G = <b>cost 1</b>. FastEthernet = 100M/100M = <b>cost 10</b>. Serial = 100M/1.544M ≈ 64. Change reference bandwidth with <code>auto-cost reference-bandwidth 10000</code> for 10GE networks. The SPF tree is rooted at each router individually — every router calculates its own shortest path tree.`,

  keys:[
    {l:'AD',v:'110 — higher than EIGRP(90), lower than RIP(120)',why:'If OSPF and RIP both have a route to same destination, OSPF wins (110 < 120). EIGRP internal (90) beats OSPF. Static (1) beats everything.',cli:'show ip route ospf\n<span class="cli-comment">! O = intra-area  O IA = inter-area</span>\n<span class="cli-comment">! O E1/E2 = external</span>',tip:'OSPF process ID is local — different IDs on two routers still form adjacency.'},
    {l:'States',v:'Down→Init→2Way→ExStart→Exchange→Loading→Full',why:'INIT = received Hello but not in neighbor\'s list. 2-Way = bidirectional communication. ExStart = master/slave negotiation by RID. Full = identical LSDBs. DROthers stop at 2-Way with each other.',cli:'show ip ospf neighbor\n<span class="cli-comment">! FULL = healthy adjacency</span>\n<span class="cli-comment">! INIT = hello timer mismatch</span>\n<span class="cli-comment">! EXSTART = duplicate Router-ID</span>',tip:'Stuck in INIT = hello/dead mismatch. Stuck in EXSTART = duplicate Router-IDs.',tt:'bad',t:'warn'},
    {l:'Full on Broadcast',v:'Only DR/BDR reach FULL — DROthers stay at 2-Way',why:'DR/BDR election reduces adjacency overhead on Ethernet. Only DR and BDR form FULL adjacency with everyone. DROthers stay at 2-Way with each other (n(n-1)/2 → 2(n-1) adjacencies).',cli:'interface G0/0\n ip ospf priority 100  ! wins DR election\n ip ospf priority 0   ! never DR\nshow ip ospf interface G0/0  ! shows DR/BDR',tip:'DR election non-preemptive — new higher-priority router won\'t displace existing DR.',tt:'warn',t:'warn'},
    {l:'Router-ID',v:'Manual > highest loopback > highest active interface at startup',why:'Choose once at OSPF startup. Doesn\'t change until "clear ip ospf process". Manual/loopback is best — stable and easy to identify in logs.',cli:'router ospf 1\n router-id 1.1.1.1\ninterface loopback 0\n ip address 1.1.1.1 255.255.255.255\nclear ip ospf process  ! apply new RID',tip:'Duplicate Router-IDs = EXSTART/EXCHANGE loop, never reaches Full.',tt:'bad'},
    {l:'EXSTART Failure',v:'Duplicate Router-IDs = stuck in EXSTART forever',why:'ExStart phase: routers compare RIDs to elect master. Same RID = neither can become master = eternal loop. Shows in logs as repeated DBD exchanges.',cli:'show ip ospf neighbor\nshow ip ospf | include Router ID\n<span class="cli-comment">! Fix: set unique RID on each router</span>\nrouter ospf 1\n router-id 1.1.1.1\nclear ip ospf process',tip:'Two routers with identical RIDs: eternal EXSTART. check show ip ospf on both.',tt:'bad',t:'bad'},
    {l:'Timer Mismatch',v:'Hello/Dead must match both sides or stuck in INIT',why:'OSPF checks Hello and Dead timers in received Hello packets. Mismatch = stuck in INIT. Also: Area ID, authentication, subnet mask, stub flag must all match.',cli:'show ip ospf interface G0/0  ! shows Hello 10 Dead 40\ninterface G0/0\n ip ospf hello-interval 5\n ip ospf dead-interval 20',tip:'Mismatch checklist: timers · Area ID · Auth · Subnet mask · Stub flag.',tt:'bad',t:'bad'}
  ]
},

/* ── 8 DHCP ── */
{ num:'13', title:'DHCP — Dynamic Host Configuration Protocol',
  desc:'DHCP (RFC 2131) automates IP address assignment using UDP broadcast. The 4-step DORA process runs over UDP 67 (server) and UDP 68 (client). Routers drop broadcasts — a relay agent (ip helper-address) is needed to cross subnet boundaries.',
  steps:[
  { label:'Step 1 — DISCOVER & OFFER',
    html:`<b>DISCOVER:</b> Client sends broadcast from 0.0.0.0 to 255.255.255.255, UDP 67, with a random XID (transaction ID). <b>OFFER:</b> Server reserves the IP and replies with: offered IP, subnet mask, default gateway, DNS servers, lease duration. Multiple servers may offer — client uses the FIRST one received and sends REQUEST to that server's IP (identifying it in the broadcast so others can release their reservation).<br><br>
<b>Conflict detection:</b> Before assigning an IP, the DHCP server pings it. If no reply in 2 pings → safe to assign. Client also runs Gratuitous ARP after receiving ACK — if another device replies → sends DECLINE back to server → server marks that IP as conflicted → assigns next available IP. Check conflicts: <code>show ip dhcp conflict</code>.<br><br>
<b>Multiple pools on one server:</b> Server matches the correct pool using the <b>giaddr</b> field (gateway address filled in by relay agent = router's client-facing interface IP). Pool network must include that giaddr. If giaddr=192.168.10.1, server picks the pool that contains 192.168.10.0/24.<br><br>
<b>APIPA diagnosis:</b> 169.254.x.x means DHCP failed. Check: ① Is server reachable? ② Is pool exhausted? (<code>show ip dhcp pool</code>) ③ Is ip helper-address configured on router? ④ Is the correct VLAN active?`,
    svg: () => D.defs()+
      D.pc('CLIENT',95,200,'#e03e3e','0.0.0.0')+
      `<text x="95" y="178" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#e03e3e">no IP · XID=0xABCD</text>`+
      D.sw('SW1',295,200)+D.srv('DHCP Server',510,200,'#27ae60','10.0.0.100')+
      D.ln(159,204,261,204)+D.ln(329,204,474,204)+
      D.wave(295,204,'#8e44ad',0)+
      D.pkt(159,204,261,204,'#8e44ad',0)+
      D.pkt(474,204,329,204,'#27ae60',1.2)+
      `<rect x="30" y="290" width="260" height="100" rx="8" fill="#8e44ad0e" stroke="#8e44ad" stroke-width="1"/>

  { label:'Step 2 — REQUEST & ACKNOWLEDGE',
    html:`<b>REQUEST:</b> Client sends broadcast (still 255.255.255.255 — to reject other offers) accepting the offered IP and identifying the server by IP. <b>ACK:</b> Server confirms, starts the lease clock. Client now configures its IP, mask, gateway, DNS. Client runs Gratuitous ARP to check for conflicts. Lease renewal starts at 50% of lease time (T1=0.5×lease) via unicast.`,

  { label:'Step 3 — ip helper-address (Relay Agent)',
    html:`<b>Routers drop broadcasts.</b> Without a relay agent, DHCP clients in VLAN 10 can never reach a DHCP server in another subnet. <code>ip helper-address [server-IP]</code> on the client-facing interface converts the DHCP broadcast to a unicast UDP packet forwarded to the server. The relay adds the client's subnet info so the server knows which pool to use.`,

       <text x="320" y="310" text-anchor="middle" font-family="Syne" font-size="10" font-weight="700" fill="#f39c12">How ip helper-address works</text>
       <text x="50" y="328" font-family="JetBrains Mono" font-size="8" fill="#555">1. Router receives DHCP broadcast on Gi0/0</text>
       <text x="50" y="344" font-family="JetBrains Mono" font-size="8" fill="#555">2. Changes src IP from 0.0.0.0 → Gi0/0 address (192.168.10.1)</text>

  keys:[
    {l:'DORA',v:'Discover(bcast)→Offer→Request(bcast)→Acknowledge',why:'DISCOVER: src=0.0.0.0, dst=255.255.255.255. OFFER: server reserves IP, unicasts back. REQUEST: client BROADCASTS acceptance (so all servers see it, others release reservations). ACK: server confirms lease.',cli:'ip dhcp excluded-address 192.168.1.1 192.168.1.10\nip dhcp pool SALES\n network 192.168.1.0 255.255.255.0\n default-router 192.168.1.1\n dns-server 8.8.8.8\n lease 1\nshow ip dhcp pool',tip:'REQUEST is broadcast so ALL DHCP servers know which one was selected.'},
    {l:'UDP Ports',v:'Server=67  Client=68 — ACLs must permit both',why:'DHCP uses UDP (no TCP handshake — client has no IP yet). Server listens on UDP 67. Client sends from UDP 68. ACLs blocking UDP 67/68 silently break DHCP.',cli:'<span class="cli-comment">! Permit DHCP through ACLs</span>\npermit udp any any eq 67\npermit udp any any eq 68\ndebug ip dhcp server events  ! live debug',tip:'Firewall blocking UDP 67 = clients can\'t get IPs. No error message — silent failure.',tt:'warn'},
    {l:'ip helper-address',v:'On CLIENT-facing interface — NOT the server interface',why:'Converts DHCP broadcasts to unicast forwarded to the server. Put on the router interface that faces the CLIENTS (the interface in the client\'s subnet). Most common mistake: putting it on the wrong interface.',cli:'interface G0/0  ! client-facing\n ip address 192.168.10.1 255.255.255.0\n ip helper-address 10.1.1.10  ! DHCP server IP',tip:'ip helper-address goes on the CLIENT-facing interface, not the server-facing one.',tt:'bad',t:'bad'},

    {l:'APIPA',v:'169.254.x.x = DHCP failed — diagnose: pool, exclusions, relay',why:'169.254.0.0/16 is Windows/macOS auto-assigned when DHCP fails. Check: server reachability, pool exhaustion, excluded ranges, relay config on router.',cli:'show ip dhcp pool  ! check Utilization %\nshow ip dhcp binding | count\nshow ip dhcp conflict\nclear ip dhcp conflict *',tip:'APIPA = DHCP server unreachable or pool exhausted.',tt:'warn',t:'warn'},
    {l:'Verify',v:'show ip dhcp binding · show ip dhcp pool · debug ip dhcp',why:'Binding: shows every active lease with MAC/IP/expiry/interface. Pool: shows utilization. Debug: real-time DHCP exchanges.',cli:'show ip dhcp binding\nshow ip dhcp pool\nshow ip dhcp conflict\ndebug ip dhcp server events  ! careful in production',tip:'"Available 0" in show ip dhcp pool = pool exhausted = APIPA for new clients.',tt:'bad'}
  ]
},
